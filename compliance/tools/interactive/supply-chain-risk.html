  var preGenControls = [

  ];

  var evidenceItems = [
    'AI component inventory completed',
    'Model provenance verified (hashes, source repos, signatures)',
    'Code generation risks assessed and controls implemented',
    'Dependency hallucination controls in place',
    'License contamination scan performed',
    'CI/CD pipeline hardened against AI-specific attacks',
    'Training data provenance documented (NIST SP 800-218A PW.3)',
    'Data poisoning risks assessed',
    'Infrastructure supply chain reviewed',

  // --- State ---

  function emptyComponent() {
    return { name: '', type: '', provider: '', version: '', countryOfOrigin: '', license: '', riskTier: '' };
  }

  function emptyThreat() {
    return { applicable: null, likelihood: '', impact: '', controls: '' };
  }

  var state = {
    components: [emptyComponent()],
    modelProvenance: {},
    modelThreats: {},
    usesCodeGen: null,
    codeGenRisks: { vulnerable: {}, dependencies: {}, license: {}, cicd: {} },
    dataProvenance: {},
    dataPoisoning: {},
    infraThreats: {},
    providerDueDiligence: {},
    contractual: {},
    monitoring: {},
    jurisdictionFlags: {},
    codeGenControls: { pre: {}, post: {}, slsa: {} },
    bom: { generated: null, format: '', location: '' },
    notes: ''
  };

  function initState() {
    for (var i = 0; i < modelProvenanceItems.length; i++) {
      var id = modelProvenanceItems[i].id;
      if (state.modelProvenance[id] === undefined) state.modelProvenance[id] = null;
    }
    for (var i = 0; i < modelThreatItems.length; i++) {
      var id = modelThreatItems[i].id;
      if (!state.modelThreats[id]) state.modelThreats[id] = emptyThreat();
    }
    var codeGenGroups = [
      { key: 'vulnerable', items: vulnerableCodeRisks },
      { key: 'dependencies', items: dependencyRisks },
      { key: 'license', items: licenseRisks },
      { key: 'cicd', items: cicdRisks }
    ];
    for (var g = 0; g < codeGenGroups.length; g++) {
      var grp = codeGenGroups[g];
      for (var i = 0; i < grp.items.length; i++) {
        if (!state.codeGenRisks[grp.key][grp.items[i].id]) state.codeGenRisks[grp.key][grp.items[i].id] = emptyThreat();
      }
    }
    for (var i = 0; i < dataProvenanceItems.length; i++) {
      if (state.dataProvenance[dataProvenanceItems[i].id] === undefined) state.dataProvenance[dataProvenanceItems[i].id] = null;
    }
    for (var i = 0; i < dataPoisoningThreats.length; i++) {
      if (!state.dataPoisoning[dataPoisoningThreats[i].id]) state.dataPoisoning[dataPoisoningThreats[i].id] = emptyThreat();
    }
    for (var i = 0; i < infraThreats.length; i++) {
      if (!state.infraThreats[infraThreats[i].id]) state.infraThreats[infraThreats[i].id] = emptyThreat();
    }
    for (var i = 0; i < dueDiligenceCriteria.length; i++) {
      if (!state.providerDueDiligence[dueDiligenceCriteria[i].id]) state.providerDueDiligence[dueDiligenceCriteria[i].id] = { assessment: '', score: '' };
    }
    for (var i = 0; i < contractualItems.length; i++) {
      if (state.contractual[contractualItems[i].id] === undefined) state.contractual[contractualItems[i].id] = null;
    }
    for (var i = 0; i < monitoringAreas.length; i++) {
      if (!state.monitoring[monitoringAreas[i].id]) state.monitoring[monitoringAreas[i].id] = { frequency: '', method: '' };
    }
    for (var i = 0; i < jurisdictionFlags.length; i++) {
      if (!state.jurisdictionFlags[jurisdictionFlags[i].id]) state.jurisdictionFlags[jurisdictionFlags[i].id] = { applicable: null, action: '' };
    }
    for (var i = 0; i < preGenControls.length; i++) {
      if (!state.codeGenControls.pre[preGenControls[i].id]) state.codeGenControls.pre[preGenControls[i].id] = { enabled: null, detail: '' };
    }
    for (var i = 0; i < postGenControls.length; i++) {
      if (!state.codeGenControls.post[postGenControls[i].id]) state.codeGenControls.post[postGenControls[i].id] = { enabled: null, detail: '' };
    }
    for (var i = 0; i < slsaItems.length; i++) {
      if (state.codeGenControls.slsa[slsaItems[i].id] === undefined) state.codeGenControls.slsa[slsaItems[i].id] = null;
    }
  }
  initState();

  // --- Risk scoring ---

  var likelihoodScores = { 'Rare': 1, 'Unlikely': 2, 'Possible': 3, 'Likely': 4, 'Almost Certain': 5 };
  var impactScores = { 'Negligible': 1, 'Minor': 2, 'Moderate': 3, 'Major': 4, 'Severe': 5 };

  function calcRiskScore(likelihood, impact) {
    var l = likelihoodScores[likelihood] || 0;
    var i = impactScores[impact] || 0;
    if (l === 0 || i === 0) return null;
    return l * i;
  }

  function riskLevel(score) {
    if (score === null) return '';
    if (score >= 20) return 'Critical';
    if (score >= 12) return 'High';
    if (score >= 6) return 'Medium';
    return 'Low';
  }

  function riskClass(level) {
    if (level === 'Critical') return 'risk-critical';
    if (level === 'High') return 'risk-high';
    if (level === 'Medium') return 'risk-medium';
    if (level === 'Low') return 'risk-low';
    return '';
  }

  // --- Wizard ---

  var wizard = createWizard({
    title: 'AI/LLM Supply Chain Risk Assessment',
    subtitle: 'Template 23 \u2014 EU AI Act Art. 25, NIST AI RMF, OWASP LLM Top 10, MITRE ATLAS, ISO/IEC 42001',
    totalSteps: 8,
    stepLabels: [
      'AI Component Inventory',
      'Model Supply Chain Risk',
      'Code Generation Risk',
      'Data & Infrastructure Risk',
      'Third-Party Assessment',
      'Cross-Jurisdiction Flags',
      'Code Gen Security Controls',
      'Summary'
    ],
    renderStep: function(step, container) {
      if (step === 0) renderStep1(container);
      else if (step === 1) renderStep2(container);
      else if (step === 2) renderStep3(container);
      else if (step === 3) renderStep4(container);
      else if (step === 4) renderStep5(container);
      else if (step === 5) renderStep6(container);
      else if (step === 6) renderStep7(container);
      else if (step === 7) renderSummary(container);
    },
    onLoad: function() {
      loadConfigFromFile(function(c) { config = c; loadState(); wizard.refreshStep(); });
    },
    onSave: doSave,
    onExport: doExport,
    stateKey: 'supplyChainRisk',
    getState: function() { return state; },
    setState: function(s) {
      if (s.components) state.components = s.components;
      if (s.modelProvenance) { for (var k in s.modelProvenance) state.modelProvenance[k] = s.modelProvenance[k]; }
      if (s.modelThreats) { for (var k in s.modelThreats) state.modelThreats[k] = s.modelThreats[k]; }
      if (s.usesCodeGen !== undefined) state.usesCodeGen = s.usesCodeGen;
      if (s.codeGenRisks) {
        var keys = ['vulnerable', 'dependencies', 'license', 'cicd'];
        for (var ki = 0; ki < keys.length; ki++) {
          if (s.codeGenRisks[keys[ki]]) {
            for (var k in s.codeGenRisks[keys[ki]]) state.codeGenRisks[keys[ki]][k] = s.codeGenRisks[keys[ki]][k];
          }
        }
      }
      if (s.dataProvenance) { for (var k in s.dataProvenance) state.dataProvenance[k] = s.dataProvenance[k]; }
      if (s.dataPoisoning) { for (var k in s.dataPoisoning) state.dataPoisoning[k] = s.dataPoisoning[k]; }
      if (s.infraThreats) { for (var k in s.infraThreats) state.infraThreats[k] = s.infraThreats[k]; }
      if (s.providerDueDiligence) { for (var k in s.providerDueDiligence) state.providerDueDiligence[k] = s.providerDueDiligence[k]; }
      if (s.contractual) { for (var k in s.contractual) state.contractual[k] = s.contractual[k]; }
      if (s.monitoring) { for (var k in s.monitoring) state.monitoring[k] = s.monitoring[k]; }
      if (s.jurisdictionFlags) { for (var k in s.jurisdictionFlags) state.jurisdictionFlags[k] = s.jurisdictionFlags[k]; }
      if (s.codeGenControls) {
        if (s.codeGenControls.pre) { for (var k in s.codeGenControls.pre) state.codeGenControls.pre[k] = s.codeGenControls.pre[k]; }
        if (s.codeGenControls.post) { for (var k in s.codeGenControls.post) state.codeGenControls.post[k] = s.codeGenControls.post[k]; }
        if (s.codeGenControls.slsa) { for (var k in s.codeGenControls.slsa) state.codeGenControls.slsa[k] = s.codeGenControls.slsa[k]; }
      }
      if (s.bom) state.bom = s.bom;
      if (s.notes !== undefined) state.notes = s.notes;
      initState();
    }
  });

  // --- Helper: render threat row with targeted DOM updates ---

  function renderThreatRow(threatDef, threatState, container) {
    var row = el('div', { className: 'threat-row' });

  // --- Collect all threats for summary ---

  function getAllThreats() {
    var threats = [];
    function addGroup(label, items, stateObj) {
      for (var i = 0; i < items.length; i++) {
        var t = stateObj[items[i].id];
        if (t && t.applicable === true) {
          var score = calcRiskScore(t.likelihood, t.impact);
          threats.push({ category: label, name: items[i].text, likelihood: t.likelihood, impact: t.impact, score: score, level: riskLevel(score), controls: t.controls });
        }
      }
    }
    addGroup('Model Integrity', modelThreatItems, state.modelThreats);
    if (state.usesCodeGen === true) {
      addGroup('Vulnerable Code', vulnerableCodeRisks, state.codeGenRisks.vulnerable);
      addGroup('Dependency Hallucination', dependencyRisks, state.codeGenRisks.dependencies);
      addGroup('License Contamination', licenseRisks, state.codeGenRisks.license);
      addGroup('CI/CD Pipeline', cicdRisks, state.codeGenRisks.cicd);
    }
    addGroup('Data Poisoning', dataPoisoningThreats, state.dataPoisoning);
    addGroup('Infrastructure', infraThreats, state.infraThreats);
    return threats;
  }

  function countByCategory(threats) {
    var cats = {};
    for (var i = 0; i < threats.length; i++) {
      cats[threats[i].category] = (cats[threats[i].category] || 0) + 1;
    }
    return cats;
  }

  function countByLevel(threats) {
    var levels = { Critical: 0, High: 0, Medium: 0, Low: 0, Unscored: 0 };
    for (var i = 0; i < threats.length; i++) {
      if (threats[i].level) levels[threats[i].level]++;
      else levels.Unscored++;
    }
    return levels;
  }

  function getEvidenceStatus() {
    var status = [];
    // 1. inventory
    var hasComps = state.components.length > 0 && state.components[0].name;
    status.push(!!hasComps);
    // 2. model provenance
    var mpCount = 0;
    for (var k in state.modelProvenance) { if (state.modelProvenance[k] === true) mpCount++; }
    status.push(mpCount > 0);
    // 3. code gen risks
    if (state.usesCodeGen === true) {
      var cgCount = 0;
      for (var k in state.codeGenRisks.vulnerable) { if (state.codeGenRisks.vulnerable[k].applicable !== null) cgCount++; }
      status.push(cgCount > 0);
    } else { status.push(state.usesCodeGen === false); }
    // 4. dep hallucination controls
    var depCount = 0;
    for (var k in state.codeGenRisks.dependencies) { if (state.codeGenRisks.dependencies[k].applicable !== null) depCount++; }
    status.push(state.usesCodeGen !== true || depCount > 0);
    // 5. license scan
    var licCount = 0;
    for (var k in state.codeGenRisks.license) { if (state.codeGenRisks.license[k].applicable !== null) licCount++; }
    status.push(state.usesCodeGen !== true || licCount > 0);
    // 6. CI/CD hardened
    var ciCount = 0;
    for (var k in state.codeGenRisks.cicd) { if (state.codeGenRisks.cicd[k].applicable !== null) ciCount++; }
    status.push(state.usesCodeGen !== true || ciCount > 0);
    // 7. data provenance
    var dpCount = 0;
    for (var k in state.dataProvenance) { if (state.dataProvenance[k] === true) dpCount++; }
    status.push(dpCount > 0);
    // 8. data poisoning
    var poisonCount = 0;
    for (var k in state.dataPoisoning) { if (state.dataPoisoning[k].applicable !== null) poisonCount++; }
    status.push(poisonCount > 0);
    // 9. infra
    var infraCount = 0;
    for (var k in state.infraThreats) { if (state.infraThreats[k].applicable !== null) infraCount++; }
    status.push(infraCount > 0);
    // 10. due diligence
    var ddCount = 0;
    for (var k in state.providerDueDiligence) { if (state.providerDueDiligence[k].score) ddCount++; }
    status.push(ddCount > 0);
    // 11. contractual
    var conCount = 0;
    for (var k in state.contractual) { if (state.contractual[k] !== null) conCount++; }
    status.push(conCount > 0);
    // 12. jurisdiction flags
    var jfCount = 0;
    for (var k in state.jurisdictionFlags) { if (state.jurisdictionFlags[k].applicable !== null) jfCount++; }
    status.push(jfCount > 0);
    // 13. BOM
    status.push(state.bom.generated === true);
    // 14. SLSA
    var slsaCount = 0;
    for (var k in state.codeGenControls.slsa) { if (state.codeGenControls.slsa[k] !== null) slsaCount++; }
    status.push(state.usesCodeGen !== true || slsaCount > 0);
    // 15. risk plan (threats documented with controls)
    var threats = getAllThreats();
    var controlledCount = 0;
    for (var i = 0; i < threats.length; i++) { if (threats[i].controls) controlledCount++; }
    status.push(threats.length === 0 || controlledCount > 0);
    // 16. next review (notes field as proxy)
    status.push(!!state.notes);
    return status;
  }

  function getComplianceGaps() {
    var gaps = [];
    if (!state.components[0] || !state.components[0].name) gaps.push('No AI components listed in inventory');
    var mpCount = 0;
    for (var k in state.modelProvenance) { if (state.modelProvenance[k] === true) mpCount++; }
    if (mpCount === 0) gaps.push('No model provenance checks completed');
    if (state.usesCodeGen === null) gaps.push('Code generation applicability not determined');
    var dpCount = 0;
    for (var k in state.dataProvenance) { if (state.dataProvenance[k] === true) dpCount++; }
    if (dpCount === 0) gaps.push('No data provenance checks completed');
    var ddCount = 0;
    for (var k in state.providerDueDiligence) { if (state.providerDueDiligence[k].score) ddCount++; }
    if (ddCount === 0) gaps.push('No provider due diligence scores assigned');
    var conCount = 0;
    for (var k in state.contractual) { if (state.contractual[k] === true) conCount++; }
    if (conCount === 0) gaps.push('No contractual requirements confirmed');
    var jfCount = 0;
    for (var k in state.jurisdictionFlags) { if (state.jurisdictionFlags[k].applicable !== null) jfCount++; }
    if (jfCount === 0) gaps.push('Jurisdiction flags not reviewed');
    if (state.bom.generated !== true) gaps.push('AIBOM/SBOM not generated');
    return gaps;
  }

    section.appendChild(el('div', { className: 'dash-card' }, [

      ])

    // Risk heat map
    section.appendChild(el('h3', {}, ['Risk Heat Map']));

    heatmap.appendChild(el('div', { className: 'heatmap-cell' }));
    var impactLabels = ['Negligible', 'Minor', 'Moderate', 'Major', 'Severe'];
    for (var hi = 0; hi < impactLabels.length; hi++) {

    }

    var likelihoodLabels = ['Almost Certain', 'Likely', 'Possible', 'Unlikely', 'Rare'];
    var likelihoodVals = [5, 4, 3, 2, 1];
    var impactVals = [1, 2, 3, 4, 5];

    // Count threats in each cell
    var heatCounts = {};
    for (var ti = 0; ti < threats.length; ti++) {
      var t = threats[ti];
      var lv = likelihoodScores[t.likelihood] || 0;
      var iv = impactScores[t.impact] || 0;
      if (lv && iv) {
        var hk = lv + '_' + iv;
        heatCounts[hk] = (heatCounts[hk] || 0) + 1;
      }
    }

    for (var li = 0; li < likelihoodLabels.length; li++) {
      heatmap.appendChild(el('div', { className: 'heatmap-cell heatmap-label' }, [likelihoodLabels[li]]));
      for (var ii = 0; ii < impactVals.length; ii++) {
        var score = likelihoodVals[li] * impactVals[ii];
        var level = riskLevel(score);
        var heatClass = 'heat-negligible';
        if (level === 'Critical') heatClass = 'heat-critical';
        else if (level === 'High') heatClass = 'heat-high';
        else if (level === 'Medium') heatClass = 'heat-medium';
        else if (level === 'Low') heatClass = 'heat-low';

        var cellKey = likelihoodVals[li] + '_' + impactVals[ii];
        var count = heatCounts[cellKey] || 0;
        var cellText = count > 0 ? String(count) : '';
        heatmap.appendChild(el('div', { className: 'heatmap-cell ' + heatClass }, [cellText]));
      }
    }
    section.appendChild(heatmap);

    // Compliance gap analysis
    section.appendChild(el('h3', {}, ['Compliance Gap Analysis']));
    var gaps = getComplianceGaps();
    if (gaps.length === 0) {
      section.appendChild(createAlert('success', 'No major compliance gaps identified. Ready for legal review.'));
    } else {
      for (var i = 0; i < gaps.length; i++) {
        section.appendChild(el('div', { className: 'gap-item' }, ['Gap: ' + gaps[i]]));
      }
    }

    // Evidence checklist status
    section.appendChild(el('h3', {}, ['Evidence Checklist Status']));
    var evStatus = getEvidenceStatus();
    var evComplete = 0;
    for (var i = 0; i < evStatus.length; i++) { if (evStatus[i]) evComplete++; }

    var evCard = el('div', { className: 'dash-card' });
    evCard.appendChild(el('div', { className: 'dash-row' }, [
      el('span', { style: 'font-weight: 600; color: #9AACBA;' }, ['Evidence Items Complete:']),
      el('span', { className: evComplete >= 12 ? 'score-low' : evComplete >= 8 ? 'score-med' : 'score-high', style: 'font-size: 1.1em;' }, [evComplete + ' / ' + evidenceItems.length])
    ]));
    for (var i = 0; i < evidenceItems.length; i++) {
      var cls = evStatus[i] ? 'pass-item' : 'gap-item';
      var marker = evStatus[i] ? '\u2713 ' : '\u2717 ';
      evCard.appendChild(el('div', { className: cls }, [marker + evidenceItems[i]]));
    }
    section.appendChild(evCard);

    // Notes
    section.appendChild(el('h3', {}, ['Additional Notes / Next Review Date']));
    section.appendChild(createTextArea('Notes', state.notes, function(v) { state.notes = v; }, 'Additional notes, next review date, etc.'));

    // Action buttons
    var actions = el('div', { className: 'toolbar', style: 'margin-top: 24px;' });
    actions.appendChild(el('button', { className: 'btn primary', textContent: 'Export Markdown', onClick: doExport }));
    actions.appendChild(el('button', { className: 'btn success', textContent: 'Save Config', onClick: doSave }));
    actions.appendChild(el('button', { className: 'btn', textContent: 'Apply to Config', onClick: function() {
      loadConfigFromFile(function(c) {
        config = c;
        config.interactiveToolResults = config.interactiveToolResults || {};
        config.interactiveToolResults.supplyChainRisk = buildResults();
        saveConfigToFile(config);
      });
    }}));
    section.appendChild(actions);

    container.appendChild(section);
  }

  // --- Load state from config ---

  function loadState() {
    if (config.interactiveToolResults && config.interactiveToolResults.supplyChainRisk) {
      var saved = config.interactiveToolResults.supplyChainRisk;
      if (saved.components) state.components = saved.components;
      if (saved.modelProvenance) { for (var k in saved.modelProvenance) state.modelProvenance[k] = saved.modelProvenance[k]; }
      if (saved.modelThreats) { for (var k in saved.modelThreats) state.modelThreats[k] = saved.modelThreats[k]; }
      if (saved.usesCodeGen !== undefined) state.usesCodeGen = saved.usesCodeGen;
      if (saved.codeGenRisks) {
        var keys = ['vulnerable', 'dependencies', 'license', 'cicd'];
        for (var ki = 0; ki < keys.length; ki++) {
          if (saved.codeGenRisks[keys[ki]]) {
            for (var k in saved.codeGenRisks[keys[ki]]) state.codeGenRisks[keys[ki]][k] = saved.codeGenRisks[keys[ki]][k];
          }
        }
      }
      if (saved.dataProvenance) { for (var k in saved.dataProvenance) state.dataProvenance[k] = saved.dataProvenance[k]; }
      if (saved.dataPoisoning) { for (var k in saved.dataPoisoning) state.dataPoisoning[k] = saved.dataPoisoning[k]; }
      if (saved.infraThreats) { for (var k in saved.infraThreats) state.infraThreats[k] = saved.infraThreats[k]; }
      if (saved.providerDueDiligence) { for (var k in saved.providerDueDiligence) state.providerDueDiligence[k] = saved.providerDueDiligence[k]; }
      if (saved.contractual) { for (var k in saved.contractual) state.contractual[k] = saved.contractual[k]; }
      if (saved.monitoring) { for (var k in saved.monitoring) state.monitoring[k] = saved.monitoring[k]; }
      if (saved.jurisdictionFlags) { for (var k in saved.jurisdictionFlags) state.jurisdictionFlags[k] = saved.jurisdictionFlags[k]; }
      if (saved.codeGenControls) {
        if (saved.codeGenControls.pre) { for (var k in saved.codeGenControls.pre) state.codeGenControls.pre[k] = saved.codeGenControls.pre[k]; }
        if (saved.codeGenControls.post) { for (var k in saved.codeGenControls.post) state.codeGenControls.post[k] = saved.codeGenControls.post[k]; }
        if (saved.codeGenControls.slsa) { for (var k in saved.codeGenControls.slsa) state.codeGenControls.slsa[k] = saved.codeGenControls.slsa[k]; }
      }
      if (saved.bom) state.bom = saved.bom;
      if (saved.notes !== undefined) state.notes = saved.notes;
    }
    initState();
  }

  // --- Build results ---

  function buildResults() {
    var threats = getAllThreats();
    var byLevel = countByLevel(threats);
    var overallLevel = 'Low';
    if (byLevel.Critical > 0) overallLevel = 'Critical';
    else if (byLevel.High > 0) overallLevel = 'High';
    else if (byLevel.Medium > 0) overallLevel = 'Medium';

    var evStatus = getEvidenceStatus();
    var evComplete = 0;
    for (var i = 0; i < evStatus.length; i++) { if (evStatus[i]) evComplete++; }

    return {
      completedDate: new Date().toISOString().split('T')[0],
      components: JSON.parse(JSON.stringify(state.components)),
      modelProvenance: JSON.parse(JSON.stringify(state.modelProvenance)),
      modelThreats: JSON.parse(JSON.stringify(state.modelThreats)),
      usesCodeGen: state.usesCodeGen,
      codeGenRisks: JSON.parse(JSON.stringify(state.codeGenRisks)),
      dataProvenance: JSON.parse(JSON.stringify(state.dataProvenance)),
      dataPoisoning: JSON.parse(JSON.stringify(state.dataPoisoning)),
      infraThreats: JSON.parse(JSON.stringify(state.infraThreats)),
      providerDueDiligence: JSON.parse(JSON.stringify(state.providerDueDiligence)),
      contractual: JSON.parse(JSON.stringify(state.contractual)),
      monitoring: JSON.parse(JSON.stringify(state.monitoring)),
      jurisdictionFlags: JSON.parse(JSON.stringify(state.jurisdictionFlags)),
      codeGenControls: JSON.parse(JSON.stringify(state.codeGenControls)),
      bom: JSON.parse(JSON.stringify(state.bom)),
      notes: state.notes,
      summary: {
        totalThreats: threats.length,
        overallRiskLevel: overallLevel,
        threatsByLevel: byLevel,
        complianceGaps: getComplianceGaps(),
        evidenceComplete: evComplete,
        evidenceTotal: evidenceItems.length
      }
    };
  }

  // --- Save ---

  function doSave() {
    config.interactiveToolResults = config.interactiveToolResults || {};
    config.interactiveToolResults.supplyChainRisk = buildResults();
    saveConfigToFile(config);
  }

  // --- Export Markdown ---

  function doExport() {
    var results = buildResults();
    var lines = [];
    lines.push('# AI/LLM Supply Chain Risk Assessment (Template 23)');
    lines.push('');
    lines.push('> **Laws served:** EU AI Act Art. 25, NIST AI RMF, OWASP LLM Top 10 2025, MITRE ATLAS, ISO/IEC 42001');
    lines.push('> **Date:** ' + results.completedDate);
    lines.push('');
    lines.push('---');
    lines.push('');

    // 1. Component Inventory
    lines.push('## 1. AI Component Inventory');
    lines.push('');
    lines.push('| Component | Type | Provider | Version | Country of Origin | License | Risk Tier |');
    lines.push('|-----------|------|----------|---------|-------------------|---------|-----------|');
    for (var i = 0; i < state.components.length; i++) {
      var c = state.components[i];
      lines.push('| ' + (c.name || '') + ' | ' + (c.type || '') + ' | ' + (c.provider || '') + ' | ' + (c.version || '') + ' | ' + (c.countryOfOrigin || '') + ' | ' + (c.license || '') + ' | ' + (c.riskTier || '') + ' |');
    }
    lines.push('');

    // 2. Model Supply Chain Risk
    lines.push('## 2. Model Supply Chain Risk (MITRE ATLAS AML.T0010)');
    lines.push('');
    lines.push('### 2.1 Model Provenance');
    lines.push('');
    lines.push('| Check | Status |');
    lines.push('|-------|--------|');
    for (var i = 0; i < modelProvenanceItems.length; i++) {
      var item = modelProvenanceItems[i];
      var marker = state.modelProvenance[item.id] === true ? 'x' : ' ';
      lines.push('| ' + item.text + ' | [' + marker + '] |');
    }
    lines.push('');

    lines.push('### 2.2 Model Integrity Threats');
    lines.push('');
    lines.push('| Threat | Applicable? | Likelihood | Impact | Risk Score | Controls |');
    lines.push('|--------|:-----------:|-----------|--------|:----------:|----------|');
    for (var i = 0; i < modelThreatItems.length; i++) {
      var item = modelThreatItems[i];
      var t = state.modelThreats[item.id];
      var score = calcRiskScore(t.likelihood, t.impact);
      var scoreStr = score !== null ? riskLevel(score) + ' (' + score + ')' : '';
      var appStr = t.applicable === true ? 'Yes' : t.applicable === false ? 'No' : '';
      lines.push('| ' + item.text + ' | ' + appStr + ' | ' + (t.likelihood || '') + ' | ' + (t.impact || '') + ' | ' + scoreStr + ' | ' + (t.controls || '') + ' |');
    }
    lines.push('');

    // 3. Code Generation
    lines.push('## 3. Code Generation Supply Chain Risk');
    lines.push('');
    if (state.usesCodeGen !== true) {
      lines.push('*Not applicable - project does not use AI for code generation.*');
      lines.push('');
    } else {
      function exportThreatTable(title, items, stateObj) {
        lines.push('### ' + title);
        lines.push('');
        lines.push('| Risk | Applicable? | Likelihood | Impact | Risk Score | Controls |');
        lines.push('|------|:-----------:|-----------|--------|:----------:|----------|');
        for (var i = 0; i < items.length; i++) {
          var t = stateObj[items[i].id];
          var score = calcRiskScore(t.likelihood, t.impact);
          var scoreStr = score !== null ? riskLevel(score) + ' (' + score + ')' : '';
          var appStr = t.applicable === true ? 'Yes' : t.applicable === false ? 'No' : '';
          lines.push('| ' + items[i].text + ' | ' + appStr + ' | ' + (t.likelihood || '') + ' | ' + (t.impact || '') + ' | ' + scoreStr + ' | ' + (t.controls || '') + ' |');
        }
        lines.push('');
      }
      exportThreatTable('3.1 Vulnerable Code Patterns', vulnerableCodeRisks, state.codeGenRisks.vulnerable);
      lines.push('**Statistics (OpenSSF 2025):** 45% of AI-assisted development tasks introduce critical security flaws; 62% of AI-generated code contains known vulnerabilities; 78% contains at least one exploitable vulnerability that traditional scanning misses.');
      lines.push('');
      exportThreatTable('3.2 Dependency Hallucination / Slopsquatting', dependencyRisks, state.codeGenRisks.dependencies);
      exportThreatTable('3.3 License Contamination', licenseRisks, state.codeGenRisks.license);
      exportThreatTable('3.4 CI/CD Pipeline Risks', cicdRisks, state.codeGenRisks.cicd);
    }

    // 4. Training Data
    lines.push('## 4. Training Data Supply Chain Risk');
    lines.push('');
    lines.push('### 4.1 Data Provenance');
    lines.push('');
    lines.push('| Check | Status |');
    lines.push('|-------|--------|');
    for (var i = 0; i < dataProvenanceItems.length; i++) {
      var item = dataProvenanceItems[i];
      var marker = state.dataProvenance[item.id] === true ? 'x' : ' ';
      lines.push('| ' + item.text + ' | [' + marker + '] |');
    }
    lines.push('');

    lines.push('### 4.2 Data Poisoning Threats');
    lines.push('');
    lines.push('| Threat | Applicable? | Likelihood | Impact | Risk Score | Controls |');
    lines.push('|--------|:-----------:|-----------|--------|:----------:|----------|');
    for (var i = 0; i < dataPoisoningThreats.length; i++) {
      var item = dataPoisoningThreats[i];
      var t = state.dataPoisoning[item.id];
      var score = calcRiskScore(t.likelihood, t.impact);
      var scoreStr = score !== null ? riskLevel(score) + ' (' + score + ')' : '';
      var appStr = t.applicable === true ? 'Yes' : t.applicable === false ? 'No' : '';
      lines.push('| ' + item.text + ' | ' + appStr + ' | ' + (t.likelihood || '') + ' | ' + (t.impact || '') + ' | ' + scoreStr + ' | ' + (t.controls || '') + ' |');
    }
    lines.push('');

    // 5. Infrastructure
    lines.push('## 5. Infrastructure Supply Chain Risk');
    lines.push('');
    lines.push('| Threat | Applicable? | Likelihood | Impact | Risk Score | Controls |');
    lines.push('|--------|:-----------:|-----------|--------|:----------:|----------|');
    for (var i = 0; i < infraThreats.length; i++) {
      var item = infraThreats[i];
      var t = state.infraThreats[item.id];
      var score = calcRiskScore(t.likelihood, t.impact);
      var scoreStr = score !== null ? riskLevel(score) + ' (' + score + ')' : '';
      var appStr = t.applicable === true ? 'Yes' : t.applicable === false ? 'No' : '';
      lines.push('| ' + item.text + ' | ' + appStr + ' | ' + (t.likelihood || '') + ' | ' + (t.impact || '') + ' | ' + scoreStr + ' | ' + (t.controls || '') + ' |');
    }
    lines.push('');

    // 6. Third-Party Provider
    lines.push('## 6. Third-Party Provider Assessment');
    lines.push('');
    lines.push('### 6.1 Provider Due Diligence');
    lines.push('');
    lines.push('| Criterion | Assessment | Score (1-5) |');
    lines.push('|-----------|-----------|:-----------:|');
    for (var i = 0; i < dueDiligenceCriteria.length; i++) {
      var crit = dueDiligenceCriteria[i];
      var dd = state.providerDueDiligence[crit.id];
      lines.push('| ' + crit.text + ' | ' + (dd.assessment || '') + ' | ' + (dd.score || '') + ' |');
    }
    lines.push('');

    lines.push('### 6.2 Contractual Requirements');
    lines.push('');
    lines.push('| Requirement | In Contract? |');
    lines.push('|-------------|:---:|');
    for (var i = 0; i < contractualItems.length; i++) {
      var item = contractualItems[i];
      var marker = state.contractual[item.id] === true ? 'x' : ' ';
      lines.push('| ' + item.text + ' | [' + marker + '] |');
    }
    lines.push('');

    lines.push('### 6.3 Ongoing Monitoring');
    lines.push('');
    lines.push('| Monitoring Area | Frequency | Method |');
    lines.push('|----------------|-----------|--------|');
    for (var i = 0; i < monitoringAreas.length; i++) {
      var area = monitoringAreas[i];
      var mon = state.monitoring[area.id];
      lines.push('| ' + area.text + ' | ' + (mon.frequency || '') + ' | ' + (mon.method || '') + ' |');
    }
    lines.push('');

    // 7. Jurisdiction Flags
    lines.push('## 7. Cross-Jurisdiction Supply Chain Flags');
    lines.push('');
    lines.push('| Flag | Applicable? | Action Required |');
    lines.push('|------|:-----------:|-----------------|');
    for (var i = 0; i < jurisdictionFlags.length; i++) {
      var flag = jurisdictionFlags[i];
      var fs = state.jurisdictionFlags[flag.id];
      var appStr = fs.applicable === true ? 'Yes' : fs.applicable === false ? 'No' : '';
      lines.push('| ' + flag.text + ' | ' + appStr + ' | ' + (fs.action || '') + ' |');
    }
    lines.push('');

    // 8. Code Gen Security Controls
    lines.push('## 8. Code Generation Security Controls');
    lines.push('');
    if (state.usesCodeGen !== true) {
      lines.push('*Not applicable.*');
      lines.push('');
    } else {
      lines.push('### 8.1 Pre-Generation Controls');
      lines.push('');
      lines.push('| Control | Implemented? | Details |');
      lines.push('|---------|:---:|---------|');
      for (var i = 0; i < preGenControls.length; i++) {
        var ctrl = preGenControls[i];
        var cs = state.codeGenControls.pre[ctrl.id];
        var marker = cs.enabled === true ? 'x' : ' ';
        lines.push('| ' + ctrl.text + ' | [' + marker + '] | ' + (cs.detail || '') + ' |');
      }
      lines.push('');

      lines.push('### 8.2 Post-Generation Controls');
      lines.push('');
      lines.push('| Control | Implemented? | Details |');
      lines.push('|---------|:---:|---------|');
      for (var i = 0; i < postGenControls.length; i++) {
        var ctrl = postGenControls[i];
        var cs = state.codeGenControls.post[ctrl.id];
        var marker = cs.enabled === true ? 'x' : ' ';
        lines.push('| ' + ctrl.text + ' | [' + marker + '] | ' + (cs.detail || '') + ' |');
      }
      lines.push('');

      lines.push('### 8.3 SLSA Compliance');
      lines.push('');
      lines.push('| SLSA Level | Met? |');
      lines.push('|-----------|:---:|');
      for (var i = 0; i < slsaItems.length; i++) {
        var item = slsaItems[i];
        var marker = state.codeGenControls.slsa[item.id] === true ? 'x' : ' ';
        lines.push('| ' + item.text + ' | [' + marker + '] |');
      }
      lines.push('');
    }

    // 9. BOM
    lines.push('## 9. Bill of Materials');
    lines.push('');
    lines.push('| Generated? | Format | Location |');
    lines.push('|:---:|--------|----------|');
    var bomMarker = state.bom.generated === true ? 'Yes' : 'No';
    lines.push('| ' + bomMarker + ' | ' + (state.bom.format || '') + ' | ' + (state.bom.location || '') + ' |');
    lines.push('');

    // 10. Risk Summary
    lines.push('## 10. Risk Summary');
    lines.push('');
    var threats = getAllThreats();
    var byLevel = countByLevel(threats);
    var overallLevel = 'Low';
    if (byLevel.Critical > 0) overallLevel = 'Critical';
    else if (byLevel.High > 0) overallLevel = 'High';
    else if (byLevel.Medium > 0) overallLevel = 'Medium';

    lines.push('- **Overall Risk Level:** ' + overallLevel);
    lines.push('- **Total Applicable Threats:** ' + threats.length);
    lines.push('- **Critical:** ' + byLevel.Critical + ' | **High:** ' + byLevel.High + ' | **Medium:** ' + byLevel.Medium + ' | **Low:** ' + byLevel.Low);
    lines.push('');

    if (threats.length > 0) {
      lines.push('| Risk | Category | Likelihood | Impact | Score | Controls |');
      lines.push('|------|----------|-----------|--------|:-----:|----------|');
      // Sort by score desc
      threats.sort(function(a, b) { return (b.score || 0) - (a.score || 0); });
      for (var i = 0; i < threats.length; i++) {
        var t = threats[i];
        var scoreStr = t.score !== null ? t.level + ' (' + t.score + ')' : 'Unscored';
        lines.push('| ' + t.name + ' | ' + t.category + ' | ' + (t.likelihood || '') + ' | ' + (t.impact || '') + ' | ' + scoreStr + ' | ' + (t.controls || '') + ' |');
      }
      lines.push('');
    }

    // 11. Evidence Checklist
    lines.push('## 11. Evidence Checklist');
    lines.push('');
    var evStatus = getEvidenceStatus();
    for (var i = 0; i < evidenceItems.length; i++) {
      var marker = evStatus[i] ? 'x' : ' ';
      lines.push('- [' + marker + '] ' + evidenceItems[i]);
    }
    lines.push('');

    // Compliance gaps
    var gaps = getComplianceGaps();
    if (gaps.length > 0) {
      lines.push('## Compliance Gaps');
      lines.push('');
      for (var i = 0; i < gaps.length; i++) {
        lines.push('- ' + gaps[i]);
      }
      lines.push('');
    }

    if (state.notes) {
      lines.push('## Notes');
      lines.push('');
      lines.push(state.notes);
      lines.push('');
    }

    lines.push('---');
    lines.push('*Generated by AI/LLM Supply Chain Risk Assessment Tool. This is research, not legal advice.*');

    exportMarkdown('supply-chain-risk-assessment.md', lines.join('\n'));
  }

  wizard.render();
})();
</script>
