<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Labeling Specification (Template 03)</title>
<script src="./shared.js"></script>
</head>
<body>
<script>
(function() {
  injectCSS();

  var config = {};

  var contentTypes = [
    { id: 'text', label: 'Text', jurisdictions: [
      { text: 'EU Art. 50(2)', cls: 'enacted' }, { text: 'China Labeling', cls: 'enacted' }, { text: 'South Korea', cls: 'enacted' }, { text: 'CA SB 942', cls: 'active-sector' }
    ]},
    { id: 'images', label: 'Images', jurisdictions: [
      { text: 'EU Art. 50(2)', cls: 'enacted' }, { text: 'China Deep Synthesis', cls: 'enacted' }, { text: 'China Labeling', cls: 'enacted' }, { text: 'South Korea', cls: 'enacted' }, { text: 'CA SB 942', cls: 'active-sector' }
    ]},
    { id: 'audio', label: 'Audio', jurisdictions: [
      { text: 'EU Art. 50(2)', cls: 'enacted' }, { text: 'China Deep Synthesis', cls: 'enacted' }, { text: 'China Labeling', cls: 'enacted' }, { text: 'CA SB 942', cls: 'active-sector' }
    ]},
    { id: 'video', label: 'Video', jurisdictions: [
      { text: 'EU Art. 50(2)', cls: 'enacted' }, { text: 'China Deep Synthesis', cls: 'enacted' }, { text: 'China Labeling', cls: 'enacted' }, { text: 'South Korea', cls: 'enacted' }, { text: 'CA SB 942', cls: 'active-sector' }
    ]},
    { id: 'virtualScenes', label: 'Virtual scenes', jurisdictions: [
      { text: 'EU Art. 50(2)', cls: 'enacted' }, { text: 'China Deep Synthesis', cls: 'enacted' }
    ]},
    { id: 'code', label: 'Code', jurisdictions: [
      { text: 'EU Art. 50(2)', cls: 'enacted' }, { text: 'CA SB 942', cls: 'active-sector' }
    ]}
  ];

  var chinaExplicitLabels = {
    text: 'Text content must display "This content is generated by AI" label at beginning or end of text',
    images: 'Images must carry visible "AI-generated" watermark in a conspicuous position',
    audio: 'Audio must include spoken or embedded notice identifying AI generation at start of playback',
    video: 'Video must display persistent "AI-generated" label overlay throughout duration',
    virtualScenes: 'Virtual scenes must include visible AI generation notice in the environment',
    code: 'Code output should include AI-generation comment header'
  };

  var placementOptions = [
    { value: '', label: '-- Select --' }, { value: 'onContent', label: 'On content' },
    { value: 'adjacent', label: 'Adjacent' }, { value: 'header', label: 'Header' },
    { value: 'footer', label: 'Footer' }, { value: 'overlay', label: 'Overlay' }
  ];

  var persistenceOptions = [
    { value: '', label: '-- Select --' }, { value: 'alwaysVisible', label: 'Always visible' },
    { value: 'onHover', label: 'On hover' }, { value: 'inProperties', label: 'In properties' }
  ];

  var watermarkOptions = [
    { value: '', label: '-- Select --' }, { value: 'visible', label: 'Visible watermark' },
    { value: 'invisible', label: 'Invisible watermark' }, { value: 'steganographic', label: 'Steganographic' },
    { value: 'spectral', label: 'Spectral embedding' }, { value: 'other', label: 'Other' }
  ];

  var machineReadableOptions = [
    { value: '', label: '-- Select --' }, { value: 'c2pa', label: 'C2PA' },
    { value: 'iptc', label: 'IPTC' }, { value: 'custom', label: 'Custom' }
  ];

  var checklistPhases = {
    design: [
      'Label text finalized and reviewed by legal counsel',
      'Label placement positions mapped for each content type',
      'Multilingual label variants prepared',
      'Minimum visibility specifications documented',
      'China-specific explicit label requirements addressed',
      'Accessibility of labels verified (screen readers, contrast)'
    ],
    coding: [
      'Label rendering pipeline implemented for each content type',
      'Metadata embedding integrated into content generation pipeline',
      'C2PA / IPTC / custom metadata schema configured',
      'Watermarking algorithm integrated and tested',
      'Label persistence logic implemented (survives copy/download)',
      'API endpoints include labeling metadata in responses'
    ],
    testing: [
      'Labels visible across all supported platforms and formats',
      'Metadata survives format conversion (e.g. PNG to JPG)',
      'Watermark survives compression and resizing',
      'Detection tool successfully identifies labeled content',
      'Labels display correctly in all supported languages',
      'End-to-end audit trail from generation to display verified'
    ]
  };

  var state = {
    contentTypes: {},
    explicitLabels: {},
    chinaMetadata: { providerName: '', contentAttributes: '', contentNumber: '', generationTimestamp: '' },
    californiaSB942: { watermarkMethod: '', detectionTool: '', robustness: null },
    euMetadata: { standard: '', interoperability: null },
    checklist: { design: {}, coding: {}, testing: {} },
    evidenceLog: []
  };

  function initState() {
    for (var i = 0; i < contentTypes.length; i++) {
      var ct = contentTypes[i];
      if (!state.contentTypes[ct.id]) state.contentTypes[ct.id] = { generated: null };
      if (!state.explicitLabels[ct.id]) state.explicitLabels[ct.id] = { labelText: '', placement: '', persistence: '', minSize: '', allLanguages: null };
    }
  }
  initState();

  var wizard = createWizard({
    title: 'Content Labeling Specification',
    subtitle: 'Template 03 \u2014 EU AI Act Art. 50; China Labeling Measures; China Deep Synthesis; South Korea; California SB 942',
    totalSteps: 6,
    stepLabels: ['Content Types', 'Explicit Labeling', 'Metadata Labeling', 'Checklist', 'Evidence Log', 'Summary'],
    renderStep: function(step, container) {
      if (step === 0) renderStep1(container);
      else if (step === 1) renderStep2(container);
      else if (step === 2) renderStep3(container);
      else if (step === 3) renderStep4(container);
      else if (step === 4) renderStep5(container);
      else if (step === 5) renderSummaryStep(container);
    },
    onLoad: function() {
      loadConfigFromFile(function(c) { config = c; loadState(); wizard.refreshStep(); });
    },
    onSave: doSave,
    onExport: doExport,
    stateKey: 'contentLabeling',
    getState: function() { return state; },
    setState: function(s) {
      if (s.contentTypes) { for (var k in s.contentTypes) { state.contentTypes[k] = s.contentTypes[k]; } }
      if (s.explicitLabels) { for (var k in s.explicitLabels) { state.explicitLabels[k] = s.explicitLabels[k]; } }
      if (s.chinaMetadata) {
        if (s.chinaMetadata.providerName !== undefined) state.chinaMetadata.providerName = s.chinaMetadata.providerName;
        if (s.chinaMetadata.contentAttributes !== undefined) state.chinaMetadata.contentAttributes = s.chinaMetadata.contentAttributes;
        if (s.chinaMetadata.contentNumber !== undefined) state.chinaMetadata.contentNumber = s.chinaMetadata.contentNumber;
        if (s.chinaMetadata.generationTimestamp !== undefined) state.chinaMetadata.generationTimestamp = s.chinaMetadata.generationTimestamp;
      }
      if (s.californiaSB942) {
        if (s.californiaSB942.watermarkMethod !== undefined) state.californiaSB942.watermarkMethod = s.californiaSB942.watermarkMethod;
        if (s.californiaSB942.detectionTool !== undefined) state.californiaSB942.detectionTool = s.californiaSB942.detectionTool;
        if (s.californiaSB942.robustness !== undefined) state.californiaSB942.robustness = s.californiaSB942.robustness;
      }
      if (s.euMetadata) {
        if (s.euMetadata.standard !== undefined) state.euMetadata.standard = s.euMetadata.standard;
        if (s.euMetadata.interoperability !== undefined) state.euMetadata.interoperability = s.euMetadata.interoperability;
      }
      if (s.checklist) { for (var phase in s.checklist) { if (!state.checklist[phase]) state.checklist[phase] = {}; for (var k in s.checklist[phase]) { state.checklist[phase][k] = s.checklist[phase][k]; } } }
      if (s.evidenceLog) state.evidenceLog = s.evidenceLog;
      initState();
    }
  });

  function renderStep1(container) {
    var section = el('div', { className: 'section' });
    section.appendChild(el('h2', {}, ['Step 1: Content Types']));
    section.appendChild(createAlert('info', 'Identify which content types are generated by your AI system. Jurisdiction-specific requirements will be shown for each applicable type.'));
    for (var i = 0; i < contentTypes.length; i++) {
      (function(ct) {
        var ctState = state.contentTypes[ct.id];
        var group = el('div', { style: 'margin-bottom: 12px; padding: 12px; border: 1px solid #1E2D3D; border-radius: 4px; background: #0D1830;' });
        group.appendChild(el('h3', {}, [ct.label]));
        group.appendChild(createToggle('Generated by this system?', ctState.generated, function(v) { ctState.generated = v; wizard.refreshStep(); }));
        if (ctState.generated === true) {
          var badgeRow = el('div', { style: 'margin-top: 8px;' });
          badgeRow.appendChild(el('span', { style: 'font-size: 0.8em; color: #6B7B8D; margin-right: 8px;' }, ['Required by:']));
          for (var j = 0; j < ct.jurisdictions.length; j++) {
            badgeRow.appendChild(el('span', { className: 'badge ' + ct.jurisdictions[j].cls }, [ct.jurisdictions[j].text]));
          }
          group.appendChild(badgeRow);
        }
        section.appendChild(group);
      })(contentTypes[i]);
    }
    container.appendChild(section);
  }

  function renderStep2(container) {
    var section = el('div', { className: 'section' });
    section.appendChild(el('h2', {}, ['Step 2: Explicit Labeling']));
    section.appendChild(createAlert('info', 'Configure visible labels for each applicable content type.'));
    var anyApplicable = false;
    for (var i = 0; i < contentTypes.length; i++) {
      (function(ct) {
        if (state.contentTypes[ct.id].generated !== true) return;
        anyApplicable = true;
        var lbl = state.explicitLabels[ct.id];
        var group = el('div', { style: 'margin-bottom: 16px; padding: 12px; border: 1px solid #1E2D3D; border-radius: 4px; background: #0D1830;' });
        group.appendChild(el('h3', {}, [ct.label]));
        group.appendChild(createTextInput('Label text', lbl.labelText, function(v) { lbl.labelText = v; }, 'e.g. "AI-Generated Content"'));
        group.appendChild(createSelect('Placement', placementOptions, lbl.placement, function(v) { lbl.placement = v; }));
        group.appendChild(createSelect('Persistence', persistenceOptions, lbl.persistence, function(v) { lbl.persistence = v; }));
        group.appendChild(createTextInput('Minimum size / visibility spec', lbl.minSize, function(v) { lbl.minSize = v; }, 'e.g. 12px font, 4.5:1 contrast ratio'));
        group.appendChild(createToggle('Available in all content languages?', lbl.allLanguages, function(v) { lbl.allLanguages = v; wizard.saveNow(); }));
        if (chinaExplicitLabels[ct.id]) {
          var chinaNote = el('div', { style: 'margin-top: 8px;' });
          chinaNote.appendChild(el('span', { className: 'badge enacted' }, ['China requirement']));
          chinaNote.appendChild(el('p', { style: 'font-size: 0.8em; color: #9AACBA; margin-top: 4px;' }, [chinaExplicitLabels[ct.id]]));
          group.appendChild(chinaNote);
        }
        section.appendChild(group);
      })(contentTypes[i]);
    }
    if (!anyApplicable) {
      section.appendChild(createAlert('warning', 'No content types marked as generated. Go back to Step 1 to identify applicable content types.'));
    }
    container.appendChild(section);
  }

  function renderStep3(container) {
    var section = el('div', { className: 'section' });
    section.appendChild(el('h2', {}, ['Step 3: Implicit / Metadata Labeling']));

    var chinaSection = el('div', { style: 'margin-bottom: 20px;' });
    chinaSection.appendChild(el('h3', {}, ['China Metadata Requirements']));
    var chinaBadge = el('div', { style: 'margin-bottom: 8px;' });
    chinaBadge.appendChild(el('span', { className: 'badge enacted' }, ['China Labeling Measures']));
    chinaBadge.appendChild(el('span', { className: 'badge enacted' }, ['China Deep Synthesis']));
    chinaSection.appendChild(chinaBadge);
    chinaSection.appendChild(createTextInput('Provider name', state.chinaMetadata.providerName, function(v) { state.chinaMetadata.providerName = v; }, 'Legal entity name of AI service provider'));
    chinaSection.appendChild(createTextInput('Content attributes', state.chinaMetadata.contentAttributes, function(v) { state.chinaMetadata.contentAttributes = v; }, 'e.g. AI-generated, AI-modified'));
    chinaSection.appendChild(createTextInput('Content number', state.chinaMetadata.contentNumber, function(v) { state.chinaMetadata.contentNumber = v; }, 'Unique content identifier'));
    chinaSection.appendChild(createTextInput('Generation timestamp', state.chinaMetadata.generationTimestamp, function(v) { state.chinaMetadata.generationTimestamp = v; }, 'ISO 8601 format or epoch'));
    section.appendChild(chinaSection);

    var caSection = el('div', { style: 'margin-bottom: 20px;' });
    caSection.appendChild(el('h3', {}, ['California SB 942']));
    var caBadge = el('div', { style: 'margin-bottom: 8px;' });
    caBadge.appendChild(el('span', { className: 'badge active-sector' }, ['CA SB 942']));
    caSection.appendChild(caBadge);
    caSection.appendChild(createSelect('Watermarking method', watermarkOptions, state.californiaSB942.watermarkMethod, function(v) { state.californiaSB942.watermarkMethod = v; }));
    caSection.appendChild(createTextInput('Detection tool description', state.californiaSB942.detectionTool, function(v) { state.californiaSB942.detectionTool = v; }, 'Describe the tool used to detect watermarks'));
    caSection.appendChild(createToggle('Robustness assessment completed?', state.californiaSB942.robustness, function(v) { state.californiaSB942.robustness = v; wizard.saveNow(); }));
    section.appendChild(caSection);

    var euSection = el('div', { style: 'margin-bottom: 20px;' });
    euSection.appendChild(el('h3', {}, ['EU AI Act Metadata']));
    var euBadge = el('div', { style: 'margin-bottom: 8px;' });
    euBadge.appendChild(el('span', { className: 'badge enacted' }, ['EU Art. 50(2)']));
    euSection.appendChild(euBadge);
    euSection.appendChild(createSelect('Machine-readable standard', machineReadableOptions, state.euMetadata.standard, function(v) { state.euMetadata.standard = v; }));
    euSection.appendChild(createToggle('Interoperability with other systems?', state.euMetadata.interoperability, function(v) { state.euMetadata.interoperability = v; wizard.saveNow(); }));
    section.appendChild(euSection);

    container.appendChild(section);
  }

  function renderStep4(container) {
    var section = el('div', { className: 'section' });
    section.appendChild(el('h2', {}, ['Step 4: Implementation Checklist']));
    section.appendChild(createAlert('info', 'Track implementation progress across design, coding, and testing phases.'));
    var phases = [
      { id: 'design', label: 'Design Phase', items: checklistPhases.design },
      { id: 'coding', label: 'Coding Phase', items: checklistPhases.coding },
      { id: 'testing', label: 'Testing Phase', items: checklistPhases.testing }
    ];
    for (var p = 0; p < phases.length; p++) {
      (function(phase) {
        var phaseSection = el('div', { style: 'margin-bottom: 16px;' });
        phaseSection.appendChild(el('h3', {}, [phase.label]));
        for (var j = 0; j < phase.items.length; j++) {
          (function(item, idx) {
            var key = phase.id + '_' + idx;
            var checked = state.checklist[phase.id][key] || false;
            var cb = el('input', { type: 'checkbox' });
            cb.checked = checked;
            cb.addEventListener('change', function() { state.checklist[phase.id][key] = cb.checked; });
            var row = el('div', { className: 'checklist-item' });
            row.appendChild(cb);
            row.appendChild(el('label', {}, [item]));
            phaseSection.appendChild(row);
          })(phase.items[j], j);
        }
        section.appendChild(phaseSection);
      })(phases[p]);
    }
    container.appendChild(section);
  }

  function renderStep5(container) {
    var section = el('div', { className: 'section' });
    section.appendChild(el('h2', {}, ['Step 5: Evidence Log']));
    section.appendChild(createAlert('info', 'Document evidence of content labeling implementation for each content type.'));
    var contentTypeOpts = [{ value: '', label: '-- Select content type --' }];
    for (var i = 0; i < contentTypes.length; i++) {
      contentTypeOpts.push({ value: contentTypes[i].id, label: contentTypes[i].label });
    }
    var labelTypeOpts = [
      { value: '', label: '-- Select label type --' }, { value: 'explicit', label: 'Explicit (visible)' },
      { value: 'metadata', label: 'Metadata' }, { value: 'watermark', label: 'Watermark' }
    ];
    for (var i = 0; i < state.evidenceLog.length; i++) {
      (function(idx) {
        var entry = state.evidenceLog[idx];
        var group = el('div', { style: 'margin-bottom: 12px; padding: 12px; border: 1px solid #1E2D3D; border-radius: 4px; background: #0D1830;' });
        var header = el('div', { style: 'display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;' });
        header.appendChild(el('h3', {}, ['Evidence Entry ' + (idx + 1)]));
        header.appendChild(el('button', { className: 'btn', textContent: 'Remove', style: 'padding: 4px 12px; font-size: 0.75em;', onClick: function() {
          state.evidenceLog.splice(idx, 1); wizard.refreshStep();
        }}));
        group.appendChild(header);
        group.appendChild(createSelect('Content type', contentTypeOpts, entry.contentType, function(v) { entry.contentType = v; }));
        group.appendChild(createSelect('Label type', labelTypeOpts, entry.labelType, function(v) { entry.labelType = v; }));
        group.appendChild(createTextInput('Implementation method', entry.implMethod, function(v) { entry.implMethod = v; }, 'e.g. CSS overlay, EXIF metadata, C2PA manifest'));
        var dateRow = el('div', { className: 'field-row' });
        dateRow.appendChild(el('label', { className: 'field-label' }, ['Test date']));
        var dateInput = el('input', { type: 'date', className: 'field-input', value: entry.testDate || '' });
        dateInput.addEventListener('change', function() { entry.testDate = dateInput.value; });
        dateRow.appendChild(dateInput);
        group.appendChild(dateRow);
        group.appendChild(createTextInput('Test result', entry.testResult, function(v) { entry.testResult = v; }, 'e.g. Pass, Fail, Partial'));
        group.appendChild(createTextInput('Sample reference', entry.sampleRef, function(v) { entry.sampleRef = v; }, 'e.g. samples/labeled-image-001.png'));
        section.appendChild(group);
      })(i);
    }
    section.appendChild(el('button', { className: 'btn', textContent: '+ Add Evidence Entry', onClick: function() {
      state.evidenceLog.push({ contentType: '', labelType: '', implMethod: '', testDate: '', testResult: '', sampleRef: '' }); wizard.refreshStep();
    }}));
    container.appendChild(section);
  }

  function renderSummaryStep(container) {
    var section = el('div', { className: 'section' });
    section.appendChild(el('h2', {}, ['Step 6: Summary']));
    var generatedCount = 0; var generatedTypes = [];
    for (var i = 0; i < contentTypes.length; i++) {
      if (state.contentTypes[contentTypes[i].id].generated === true) { generatedCount++; generatedTypes.push(contentTypes[i].label); }
    }
    var explicitComplete = 0;
    for (var i = 0; i < contentTypes.length; i++) {
      var ct = contentTypes[i];
      if (state.contentTypes[ct.id].generated !== true) continue;
      var lbl = state.explicitLabels[ct.id];
      if (lbl.labelText && lbl.placement && lbl.persistence) explicitComplete++;
    }
    var chinaFields = [state.chinaMetadata.providerName, state.chinaMetadata.contentAttributes, state.chinaMetadata.contentNumber, state.chinaMetadata.generationTimestamp];
    var chinaFilled = chinaFields.filter(function(f) { return !!f; }).length;
    var watermarkStatus = state.californiaSB942.watermarkMethod ? 'Configured (' + state.californiaSB942.watermarkMethod + ')' : 'Not configured';
    var phases = ['design', 'coding', 'testing'];
    var totalChecked = 0; var totalItems = 0; var phaseCounts = {};
    for (var p = 0; p < phases.length; p++) {
      var pId = phases[p]; var items = checklistPhases[pId]; var checked = 0;
      for (var j = 0; j < items.length; j++) { if (state.checklist[pId][pId + '_' + j]) checked++; }
      phaseCounts[pId] = { checked: checked, total: items.length };
      totalChecked += checked; totalItems += items.length;
    }
    var checklistPct = totalItems > 0 ? Math.round((totalChecked / totalItems) * 100) : 0;
    var table = el('table', { className: 'result-table' });
    var thead = el('thead'); var headerRow = el('tr');
    headerRow.appendChild(el('th', {}, ['Metric']));
    headerRow.appendChild(el('th', {}, ['Value']));
    headerRow.appendChild(el('th', {}, ['Status']));
    thead.appendChild(headerRow); table.appendChild(thead);
    var tbody = el('tbody');
    addRow(tbody, 'Content types covered', generatedCount + ' / ' + contentTypes.length + (generatedTypes.length > 0 ? ' (' + generatedTypes.join(', ') + ')' : ''), generatedCount > 0 ? 'score-low' : 'score-high');
    addRow(tbody, 'Explicit labels configured', explicitComplete + ' / ' + generatedCount, generatedCount > 0 && explicitComplete === generatedCount ? 'score-low' : explicitComplete > 0 ? 'score-med' : 'score-high');
    addRow(tbody, 'China metadata fields', chinaFilled + ' / 4', chinaFilled === 4 ? 'score-low' : chinaFilled >= 2 ? 'score-med' : 'score-high');
    addRow(tbody, 'Watermarking', watermarkStatus, state.californiaSB942.watermarkMethod ? 'score-low' : 'score-high');
    addRow(tbody, 'EU metadata standard', state.euMetadata.standard || 'Not selected', state.euMetadata.standard ? 'score-low' : 'score-high');
    for (var p = 0; p < phases.length; p++) {
      var pId = phases[p]; var pc = phaseCounts[pId];
      var pPct = pc.total > 0 ? Math.round((pc.checked / pc.total) * 100) : 0;
      addRow(tbody, pId.charAt(0).toUpperCase() + pId.slice(1) + ' checklist', pc.checked + ' / ' + pc.total, pPct >= 80 ? 'score-low' : pPct >= 50 ? 'score-med' : 'score-high');
    }
    addRow(tbody, 'Evidence entries', state.evidenceLog.length + ' entries', state.evidenceLog.length > 0 ? 'score-low' : 'score-high');
    table.appendChild(tbody); section.appendChild(table);
    var scores = [];
    if (generatedCount > 0) scores.push(Math.round((explicitComplete / generatedCount) * 100));
    scores.push(Math.round((chinaFilled / 4) * 100));
    scores.push(state.californiaSB942.watermarkMethod ? 100 : 0);
    scores.push(state.euMetadata.standard ? 100 : 0);
    scores.push(checklistPct);
    var overallPct = scores.length > 0 ? Math.round(scores.reduce(function(a, b) { return a + b; }, 0) / scores.length) : 0;
    var overallEl = el('div', { style: 'margin-top: 16px; text-align: center; font-size: 1.2em;' });
    overallEl.appendChild(document.createTextNode('Overall Completeness: '));
    var overallCls = overallPct >= 80 ? 'score-low' : overallPct >= 50 ? 'score-med' : 'score-high';
    overallEl.appendChild(el('span', { className: overallCls }, [overallPct + '%']));
    section.appendChild(overallEl);
    if (overallPct < 50) section.appendChild(createAlert('danger', 'Content labeling is incomplete. Multiple areas require attention before deployment.'));
    else if (overallPct < 80) section.appendChild(createAlert('warning', 'Content labeling is partially complete. Review gaps in metadata and checklist items.'));
    else section.appendChild(createAlert('success', 'Content labeling is substantially complete. Proceed to legal review.'));
    var exportBar = el('div', { className: 'toolbar', style: 'margin-top: 16px;' });
    exportBar.appendChild(el('button', { className: 'btn primary', textContent: 'Export Markdown', onClick: doExport }));
    exportBar.appendChild(el('button', { className: 'btn success', textContent: 'Save Config', onClick: doSave }));
    section.appendChild(exportBar);
    container.appendChild(section);
  }

  function addRow(tbody, metric, value, scoreCls) {
    var row = el('tr');
    row.appendChild(el('td', {}, [metric]));
    row.appendChild(el('td', {}, [value]));
    var statusCell = el('td');
    if (scoreCls) {
      var lbl = scoreCls === 'score-low' ? 'Good' : scoreCls === 'score-med' ? 'Partial' : 'Needs work';
      statusCell.appendChild(el('span', { className: scoreCls }, [lbl]));
    }
    row.appendChild(statusCell); tbody.appendChild(row);
  }

  function loadState() {
    if (config.interactiveToolResults && config.interactiveToolResults.contentLabeling) {
      var saved = config.interactiveToolResults.contentLabeling;
      if (saved.contentTypes) state.contentTypes = JSON.parse(JSON.stringify(saved.contentTypes));
      if (saved.explicitLabels) state.explicitLabels = JSON.parse(JSON.stringify(saved.explicitLabels));
      if (saved.chinaMetadata) state.chinaMetadata = JSON.parse(JSON.stringify(saved.chinaMetadata));
      if (saved.californiaSB942) state.californiaSB942 = JSON.parse(JSON.stringify(saved.californiaSB942));
      if (saved.euMetadata) state.euMetadata = JSON.parse(JSON.stringify(saved.euMetadata));
      if (saved.checklist) state.checklist = JSON.parse(JSON.stringify(saved.checklist));
      if (saved.evidenceLog) state.evidenceLog = JSON.parse(JSON.stringify(saved.evidenceLog));
      initState();
    }
  }

  function buildResults() {
    var generatedCount = 0; var explicitComplete = 0;
    for (var i = 0; i < contentTypes.length; i++) {
      var ct = contentTypes[i];
      if (state.contentTypes[ct.id].generated === true) {
        generatedCount++;
        var lbl = state.explicitLabels[ct.id];
        if (lbl.labelText && lbl.placement && lbl.persistence) explicitComplete++;
      }
    }
    return {
      completedDate: new Date().toISOString().split('T')[0],
      contentTypes: JSON.parse(JSON.stringify(state.contentTypes)),
      explicitLabels: JSON.parse(JSON.stringify(state.explicitLabels)),
      chinaMetadata: JSON.parse(JSON.stringify(state.chinaMetadata)),
      californiaSB942: JSON.parse(JSON.stringify(state.californiaSB942)),
      euMetadata: JSON.parse(JSON.stringify(state.euMetadata)),
      checklist: JSON.parse(JSON.stringify(state.checklist)),
      evidenceLog: JSON.parse(JSON.stringify(state.evidenceLog)),
      stats: { contentTypesGenerated: generatedCount, explicitLabelsComplete: explicitComplete, evidenceEntries: state.evidenceLog.length }
    };
  }

  function doSave() {
    config.interactiveToolResults = config.interactiveToolResults || {};
    config.interactiveToolResults.contentLabeling = buildResults();
    saveConfigToFile(config);
  }

  function doExport() {
    var r = buildResults(); var lines = [];
    lines.push('# Content Labeling Specification Report (Template 03)'); lines.push('');
    lines.push('**Date:** ' + r.completedDate);
    lines.push('**Applicable Law:** EU AI Act Art. 50; China Labeling Measures; China Deep Synthesis; South Korea; California SB 942');
    lines.push(''); lines.push('## 1. Content Types'); lines.push('');
    lines.push('| Content Type | Generated | Jurisdictions |');
    lines.push('|-------------|-----------|---------------|');
    for (var i = 0; i < contentTypes.length; i++) {
      var ct = contentTypes[i];
      var gen = r.contentTypes[ct.id] && r.contentTypes[ct.id].generated === true ? 'Yes' : 'No';
      var jTexts = [];
      for (var j = 0; j < ct.jurisdictions.length; j++) jTexts.push(ct.jurisdictions[j].text);
      lines.push('| ' + ct.label + ' | ' + gen + ' | ' + jTexts.join(', ') + ' |');
    }
    lines.push(''); lines.push('## 2. Explicit Labeling'); lines.push('');
    for (var i = 0; i < contentTypes.length; i++) {
      var ct = contentTypes[i];
      if (!r.contentTypes[ct.id] || r.contentTypes[ct.id].generated !== true) continue;
      var lbl = r.explicitLabels[ct.id] || {};
      lines.push('### ' + ct.label);
      lines.push('- **Label text:** ' + (lbl.labelText || 'N/A'));
      lines.push('- **Placement:** ' + (lbl.placement || 'N/A'));
      lines.push('- **Persistence:** ' + (lbl.persistence || 'N/A'));
      lines.push('- **Min size/visibility:** ' + (lbl.minSize || 'N/A'));
      lines.push('- **All languages:** ' + (lbl.allLanguages === true ? 'Yes' : lbl.allLanguages === false ? 'No' : 'N/A'));
      lines.push('');
    }
    lines.push('## 3. Implicit / Metadata Labeling'); lines.push('');
    lines.push('### China Metadata');
    lines.push('- **Provider name:** ' + (r.chinaMetadata.providerName || 'N/A'));
    lines.push('- **Content attributes:** ' + (r.chinaMetadata.contentAttributes || 'N/A'));
    lines.push('- **Content number:** ' + (r.chinaMetadata.contentNumber || 'N/A'));
    lines.push('- **Generation timestamp:** ' + (r.chinaMetadata.generationTimestamp || 'N/A'));
    lines.push('');
    lines.push('### California SB 942');
    lines.push('- **Watermarking method:** ' + (r.californiaSB942.watermarkMethod || 'N/A'));
    lines.push('- **Detection tool:** ' + (r.californiaSB942.detectionTool || 'N/A'));
    lines.push('- **Robustness assessed:** ' + (r.californiaSB942.robustness === true ? 'Yes' : r.californiaSB942.robustness === false ? 'No' : 'N/A'));
    lines.push('');
    lines.push('### EU AI Act');
    lines.push('- **Machine-readable standard:** ' + (r.euMetadata.standard || 'N/A'));
    lines.push('- **Interoperability:** ' + (r.euMetadata.interoperability === true ? 'Yes' : r.euMetadata.interoperability === false ? 'No' : 'N/A'));
    lines.push('');
    lines.push('## 4. Implementation Checklist'); lines.push('');
    var phases = [
      { id: 'design', label: 'Design Phase', items: checklistPhases.design },
      { id: 'coding', label: 'Coding Phase', items: checklistPhases.coding },
      { id: 'testing', label: 'Testing Phase', items: checklistPhases.testing }
    ];
    for (var p = 0; p < phases.length; p++) {
      var phase = phases[p]; lines.push('### ' + phase.label);
      for (var j = 0; j < phase.items.length; j++) {
        var key = phase.id + '_' + j;
        var checked = r.checklist[phase.id] && r.checklist[phase.id][key];
        lines.push('- [' + (checked ? 'x' : ' ') + '] ' + phase.items[j]);
      }
      lines.push('');
    }
    lines.push('## 5. Evidence Log'); lines.push('');
    if (r.evidenceLog.length === 0) { lines.push('No evidence entries recorded.'); }
    else {
      lines.push('| # | Content Type | Label Type | Method | Date | Result | Sample |');
      lines.push('|---|-------------|------------|--------|------|--------|--------|');
      for (var i = 0; i < r.evidenceLog.length; i++) {
        var e = r.evidenceLog[i]; var ctName = '';
        for (var c = 0; c < contentTypes.length; c++) { if (contentTypes[c].id === e.contentType) { ctName = contentTypes[c].label; break; } }
        lines.push('| ' + (i+1) + ' | ' + (ctName||e.contentType||'N/A') + ' | ' + (e.labelType||'N/A') + ' | ' + (e.implMethod||'N/A') + ' | ' + (e.testDate||'N/A') + ' | ' + (e.testResult||'N/A') + ' | ' + (e.sampleRef||'N/A') + ' |');
      }
    }
    lines.push(''); lines.push('## 6. Summary'); lines.push('');
    lines.push('- **Content types generated:** ' + r.stats.contentTypesGenerated + ' / ' + contentTypes.length);
    lines.push('- **Explicit labels complete:** ' + r.stats.explicitLabelsComplete + ' / ' + r.stats.contentTypesGenerated);
    lines.push('- **Evidence entries:** ' + r.stats.evidenceEntries);
    lines.push(''); lines.push('---');
    lines.push('*Generated by Content Labeling Specification Tool. This is research, not legal advice.*');
    exportMarkdown('content-labeling-report.md', lines.join('\n'));
  }

  wizard.render();
})();
</script>
