<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Subject Rights Implementation (Template 11)</title>
<script src="./shared.js"></script>
</head>
<body>
<a class="skip-nav" href="#main">Skip to content</a>

<script>
(function() {
  injectCSS();

  var style = document.createElement('style');
  style.textContent = [
    '.right-card { background: #0D1830; border: 1px solid #1E2D3D; border-radius: 4px; padding: 14px 16px; margin-bottom: 10px; }',
    '.right-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }',
    '.right-name { font-size: 0.95em; color: #E8B96A; font-weight: 600; }',
    '.badge-row { display: flex; flex-wrap: wrap; gap: 4px; margin: 6px 0; }',
    '.channel-card { background: #0D1830; border: 1px solid #1E2D3D; border-radius: 4px; padding: 12px 16px; margin-bottom: 8px; }',
    '.channel-name { font-size: 0.9em; color: #E8B96A; margin-bottom: 6px; }',
    '.challenge-card { background: #0D1830; border: 1px solid #1E2D3D; border-radius: 4px; padding: 14px 16px; margin-bottom: 10px; }',
    '.challenge-title { font-size: 0.9em; color: #E8B96A; margin-bottom: 8px; font-weight: 500; }',
    '.exemption-card { background: #0D1830; border: 1px solid #1E2D3D; border-radius: 4px; padding: 14px 16px; margin-bottom: 10px; }',
    '.exemption-title { font-size: 0.9em; color: #E8B96A; margin-bottom: 4px; font-weight: 500; }',
    '.exemption-scope { font-size: 0.8em; color: #9FC8FF; margin-bottom: 8px; }',
    '.cond-section { margin-top: 8px; padding: 10px 12px; border-left: 2px solid #8A9BAD; background: #0B142688; }',
    '.score-bar { height: 8px; border-radius: 4px; background: #8A9BAD; margin: 8px 0; overflow: hidden; }',
    '.score-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }',
    '.score-container { margin: 16px 0; }',
    '.score-label { display: flex; justify-content: space-between; font-size: 0.85em; margin-bottom: 4px; }',
    '.stat-row { display: flex; gap: 16px; flex-wrap: wrap; margin: 12px 0; }',
    '.summary-stat { display: inline-block; padding: 10px 18px; margin: 4px; border-radius: 4px; background: #1E2D3D; text-align: center; min-width: 120px; }',
    '.summary-stat-value { font-size: 1.4em; font-weight: 600; display: block; }',
    '.summary-stat-label { font-size: 0.75em; color: #9FC8FF; }',
    '.summary-card { background: #0D1830; border: 1px solid #1E2D3D; border-radius: 4px; padding: 14px; margin-bottom: 10px; }',
    '.summary-card-title { font-size: 0.95em; color: #E8B96A; margin-bottom: 8px; }',
    '.compliance-rating { padding: 16px; border-radius: 6px; text-align: center; margin: 16px 0; }',
    '.compliance-rating.compliant { background: #2A7B7B22; border: 2px solid #2A7B7B; }',
    '.compliance-rating.partial { background: #D4943A22; border: 2px solid #D4943A; }',
    '.compliance-rating.non-compliant { background: #c0392b22; border: 2px solid #c0392b; }',
    '.rating-label { font-size: 1.3em; font-weight: 700; }',
    '.rating-label.compliant { color: #4DBFBF; }',
    '.rating-label.partial { color: #E8B96A; }',
    '.rating-label.non-compliant { color: #e74c3c; }',
    '.jurisdiction-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border: 1px solid #1E2D3D; border-radius: 4px; margin-bottom: 4px; background: #0D1830; font-size: 0.85em; }',
    '.jurisdiction-status { font-weight: 600; }',
    '.jurisdiction-status.pass { color: #4DBFBF; }',
    '.jurisdiction-status.warn { color: #E8B96A; }',
    '.jurisdiction-status.fail { color: #e74c3c; }',
    '.remediation-item { padding: 8px 12px; border-left: 3px solid #c0392b; background: #c0392b11; margin-bottom: 6px; border-radius: 0 4px 4px 0; font-size: 0.85em; }',
    '.inline-warning { font-size: 0.8em; color: #E8B96A; padding: 4px 8px; background: #D4943A15; border-radius: 3px; margin-top: 4px; display: block; }',
    '.inline-critical { font-size: 0.8em; color: #e74c3c; padding: 4px 8px; background: #c0392b15; border-radius: 3px; margin-top: 4px; display: block; }',
    '.subsection { margin: 16px 0 12px; padding-bottom: 4px; border-bottom: 1px solid #1E2D3D22; }',
    '.subsection-title { font-size: 0.95em; color: #9AACBA; font-weight: 500; }'
  ].join('\n');
  document.head.appendChild(style);

  var config = {};

  // --- Rights Definition ---
  var RIGHTS = [
    { id: 'informed', name: 'Right to be informed', jurisdictions: ['EU','UK','India','Brazil','S.Africa','Canada','Australia','S.Korea'] },
    { id: 'access', name: 'Right of access', jurisdictions: ['EU','UK','India','Brazil','S.Africa','Canada','Australia','S.Korea'] },
    { id: 'rectification', name: 'Right to rectification', jurisdictions: ['EU','UK','India','Brazil','S.Africa','Canada','Australia','S.Korea'] },
    { id: 'erasure', name: 'Right to erasure/deletion', jurisdictions: ['EU','UK','India','Brazil','Australia','S.Korea'] },
    { id: 'restrict', name: 'Right to restrict processing', jurisdictions: ['EU','UK'] },
    { id: 'portability', name: 'Right to data portability', jurisdictions: ['EU','UK','Brazil','S.Korea'] },
    { id: 'object', name: 'Right to object', jurisdictions: ['EU','UK','Brazil','S.Africa','Canada','Australia','S.Korea'] },
    { id: 'automated', name: 'Right re: automated decisions', jurisdictions: ['EU','UK','Brazil','S.Africa','Australia','S.Korea'] },
    { id: 'withdrawConsent', name: 'Right to withdraw consent', jurisdictions: ['EU','UK','India','Brazil','S.Africa','Canada','Australia','S.Korea'] },
    { id: 'complain', name: 'Right to complain to authority', jurisdictions: ['EU','UK','India','Brazil','S.Africa','Canada','Australia','S.Korea'] }
  ];

  var RESPONSE_TIME_OPTIONS = [
    { value: '', label: '-- Select --' },
    { value: 'at_collection', label: 'At collection' },
    { value: 'immediate', label: 'Immediate' },
    { value: '30_days', label: '30 days' },
    { value: '45_days', label: '45 days' },
    { value: 'other', label: 'Other' }
  ];

  var EXEMPTIONS = [
    { id: 'unfounded', name: 'Manifestly unfounded/excessive', scope: 'EU, UK', jurisdictions: ['EU','UK'] },
    { id: 'legalRetention', name: 'Legal obligation to retain', scope: 'All jurisdictions', jurisdictions: ['EU','UK','India','Brazil','S.Africa','Canada','Australia','S.Korea'] },
    { id: 'legalClaims', name: 'Legal claims', scope: 'EU, UK', jurisdictions: ['EU','UK'] },
    { id: 'publicInterest', name: 'Public interest', scope: 'EU, UK', jurisdictions: ['EU','UK'] },
    { id: 'freeExpression', name: 'Freedom of expression', scope: 'EU', jurisdictions: ['EU'] }
  ];

  var LOG_FIELDS = [
    { id: 'requestId', name: 'Request ID' },
    { id: 'date', name: 'Date' },
    { id: 'subjectId', name: 'Subject ID' },
    { id: 'rightExercised', name: 'Right exercised' },
    { id: 'verificationStatus', name: 'Verification status' },
    { id: 'outcome', name: 'Outcome' },
    { id: 'responseDate', name: 'Response date' },
    { id: 'daysTaken', name: 'Days taken' }
  ];

  // --- Data init ---
  function initData() {
    if (!config.interactiveToolResults) config.interactiveToolResults = {};
    if (!config.interactiveToolResults.dsrImplementation) {
      config.interactiveToolResults.dsrImplementation = {
        rights: {},
        channels: {
          onlineForm: { enabled: null, url: '' },
          email: { enabled: null, address: '' },
          inApp: { enabled: null, description: '' },
          physicalMail: { enabled: null },
          phone: { enabled: null }
        },
        identity: {
          method: '',
          overCollectionAddressed: null,
          failedVerificationFallback: null
        },
        sla: {
          acknowledgeReceipt: '',
          verifyIdentity: '',
          executeRequest: '',
          notifyOutcome: ''
        },
        aiErasure: {
          trainingSet: { method: '', details: '' },
          memorized: { evaluated: null, mitigation: '' },
          logsCaches: { purgeExists: null, details: '' },
          backups: { purgeSchedule: null, details: '' },
          thirdParty: { notificationProcedure: null, details: '' }
        },
        aiAutomated: {
          humanReviewHow: '',
          reviewerRole: '',
          reviewTurnaround: '',
          canOverturn: '',
          explanationProvided: null
        },
        aiPortability: {
          format: '',
          dataIncluded: { input: false, profile: false, interaction: false, aiOutputs: false },
          transmissionMethod: ''
        },
        exemptions: {},
        logging: {
          systemOperational: null,
          fields: {},
          automatedSlaTracking: null,
          slaBreachAlerts: null,
          staffTrained: null,
          trainingDate: '',
          numberTrained: '',
          periodicAudit: null,
          auditFrequency: '',
          lastAuditDate: '',
          auditFindings: null
        }
      };
      // Init per-right data
      RIGHTS.forEach(function(r) {
        config.interactiveToolResults.dsrImplementation.rights[r.id] = {
          implemented: null,
          responseTime: '',
          method: ''
        };
      });
      // Init per-exemption data
      EXEMPTIONS.forEach(function(ex) {
        config.interactiveToolResults.dsrImplementation.exemptions[ex.id] = {
          policyExists: null,
          howInvoked: '',
          whoDecides: '',
          writtenJustification: null
        };
      });
      // Init log fields
      LOG_FIELDS.forEach(function(f) {
        config.interactiveToolResults.dsrImplementation.logging.fields[f.id] = false;
      });
    }
    return config.interactiveToolResults.dsrImplementation;
  }

  function getData() {
    return config.interactiveToolResults.dsrImplementation;
  }

  // --- Scoring helpers ---
  function getRightsImplementedCount() {
    var data = getData();
    var count = 0;
    RIGHTS.forEach(function(r) { if (data.rights[r.id].implemented === true) count++; });
    return count;
  }

  function getChannelCount() {
    var data = getData();
    var ch = data.channels;
    var count = 0;
    if (ch.onlineForm.enabled === true) count++;
    if (ch.email.enabled === true) count++;
    if (ch.inApp.enabled === true) count++;
    if (ch.physicalMail.enabled === true) count++;
    if (ch.phone.enabled === true) count++;
    return count;
  }

  function getErasureMethodsAddressed() {
    var data = getData();
    var ai = data.aiErasure;
    var count = 0;
    if (ai.trainingSet.method && ai.trainingSet.method !== '') count++;
    if (ai.memorized.evaluated === true) count++;
    if (ai.logsCaches.purgeExists === true) count++;
    if (ai.backups.purgeSchedule === true) count++;
    if (ai.thirdParty.notificationProcedure === true) count++;
    return count;
  }

  function getExemptionsDocumented() {
    var data = getData();
    var count = 0;
    EXEMPTIONS.forEach(function(ex) {
      if (data.exemptions[ex.id].policyExists === true) count++;
    });
    return count;
  }

  function getLogFieldsCount() {
    var data = getData();
    var count = 0;
    LOG_FIELDS.forEach(function(f) {
      if (data.logging.fields[f.id] === true) count++;
    });
    return count;
  }

  function getOverallRating() {
    var data = getData();
    var rightsCount = getRightsImplementedCount();
    var channelCount = getChannelCount();
    var logFields = getLogFieldsCount();
    var loggingActive = data.logging.systemOperational === true;

    // Critical checks
    var criticalRights = ['informed','access','rectification','erasure','withdrawConsent'];
    var criticalMissing = false;
    criticalRights.forEach(function(rId) {
      if (data.rights[rId].implemented !== true) criticalMissing = true;
    });

    if (!criticalMissing && loggingActive && channelCount >= 2 && rightsCount >= 8 && logFields >= 6) {
      return 'COMPLIANT';
    }
    if (rightsCount >= 5 && channelCount >= 1 && (loggingActive || logFields >= 4)) {
      return 'PARTIALLY COMPLIANT';
    }
    return 'NON-COMPLIANT';
  }

  // --- Score bar helper ---
  function buildScoreBar(pct, label) {
    var color = pct >= 100 ? '#4DBFBF' : pct >= 80 ? '#E8B96A' : '#e74c3c';
    var container = el('div', { className: 'score-container' });
    var labelRow = el('div', { className: 'score-label' });
    labelRow.appendChild(el('span', {}, [label]));
    var pctSpan = el('span', { style: 'color:' + color });
    pctSpan.textContent = pct + '%';
    labelRow.appendChild(pctSpan);
    container.appendChild(labelRow);
    var bar = el('div', { className: 'score-bar' });
    var fill = el('div', { className: 'score-fill', style: 'width:' + pct + '%;background:' + color });
    bar.appendChild(fill);
    container.appendChild(bar);
    return container;
  }

  // --- Wizard ---
  var wizard = createWizard({
    title: 'Data Subject Rights Implementation',
    subtitle: 'Template 11 \u2014 Evidence gathering for GDPR, UK GDPR, DPDPA, LGPD, POPIA, PIPEDA, Privacy Act, PIPA, PDPA (14+ laws)',
    totalSteps: 6,
    stepLabels: ['Rights Matrix', 'Request Handling', 'AI Challenges', 'Exemptions', 'Logging & Audit', 'Summary'],
    renderStep: function(step, container) {
      initData();
      if (step === 0) renderStep1(container);
      else if (step === 1) renderStep2(container);
      else if (step === 2) renderStep3(container);
      else if (step === 3) renderStep4(container);
      else if (step === 4) renderStep5(container);
      else if (step === 5) renderStep6(container);
    },
    onLoad: function() {
      loadConfigFromFile(function(c) { config = c; initData(); wizard.refreshStep(); });
    },
    onSave: function() { saveConfigToFile(config); },
    onExport: function() { doExportMarkdown(); },
    stateKey: 'dsrRightsImplementation',
    getState: function() { return getData(); },
    setState: function(s) {
      initData();
      var data = getData();
      if (s.rights) { for (var k in s.rights) { data.rights[k] = s.rights[k]; } }
      if (s.channels) {
        if (s.channels.onlineForm) { for (var k in s.channels.onlineForm) { data.channels.onlineForm[k] = s.channels.onlineForm[k]; } }
        if (s.channels.email) { for (var k in s.channels.email) { data.channels.email[k] = s.channels.email[k]; } }
        if (s.channels.inApp) { for (var k in s.channels.inApp) { data.channels.inApp[k] = s.channels.inApp[k]; } }
        if (s.channels.physicalMail) { for (var k in s.channels.physicalMail) { data.channels.physicalMail[k] = s.channels.physicalMail[k]; } }
        if (s.channels.phone) { for (var k in s.channels.phone) { data.channels.phone[k] = s.channels.phone[k]; } }
      }
      if (s.identity) {
        if (s.identity.method !== undefined) data.identity.method = s.identity.method;
        if (s.identity.overCollectionAddressed !== undefined) data.identity.overCollectionAddressed = s.identity.overCollectionAddressed;
        if (s.identity.failedVerificationFallback !== undefined) data.identity.failedVerificationFallback = s.identity.failedVerificationFallback;
      }
      if (s.sla) {
        if (s.sla.acknowledgeReceipt !== undefined) data.sla.acknowledgeReceipt = s.sla.acknowledgeReceipt;
        if (s.sla.verifyIdentity !== undefined) data.sla.verifyIdentity = s.sla.verifyIdentity;
        if (s.sla.executeRequest !== undefined) data.sla.executeRequest = s.sla.executeRequest;
        if (s.sla.notifyOutcome !== undefined) data.sla.notifyOutcome = s.sla.notifyOutcome;
      }
      if (s.aiErasure) {
        if (s.aiErasure.trainingSet) { for (var k in s.aiErasure.trainingSet) { data.aiErasure.trainingSet[k] = s.aiErasure.trainingSet[k]; } }
        if (s.aiErasure.memorized) { for (var k in s.aiErasure.memorized) { data.aiErasure.memorized[k] = s.aiErasure.memorized[k]; } }
        if (s.aiErasure.logsCaches) { for (var k in s.aiErasure.logsCaches) { data.aiErasure.logsCaches[k] = s.aiErasure.logsCaches[k]; } }
        if (s.aiErasure.backups) { for (var k in s.aiErasure.backups) { data.aiErasure.backups[k] = s.aiErasure.backups[k]; } }
        if (s.aiErasure.thirdParty) { for (var k in s.aiErasure.thirdParty) { data.aiErasure.thirdParty[k] = s.aiErasure.thirdParty[k]; } }
      }
      if (s.aiAutomated) {
        if (s.aiAutomated.humanReviewHow !== undefined) data.aiAutomated.humanReviewHow = s.aiAutomated.humanReviewHow;
        if (s.aiAutomated.reviewerRole !== undefined) data.aiAutomated.reviewerRole = s.aiAutomated.reviewerRole;
        if (s.aiAutomated.reviewTurnaround !== undefined) data.aiAutomated.reviewTurnaround = s.aiAutomated.reviewTurnaround;
        if (s.aiAutomated.canOverturn !== undefined) data.aiAutomated.canOverturn = s.aiAutomated.canOverturn;
        if (s.aiAutomated.explanationProvided !== undefined) data.aiAutomated.explanationProvided = s.aiAutomated.explanationProvided;
      }
      if (s.aiPortability) {
        if (s.aiPortability.format !== undefined) data.aiPortability.format = s.aiPortability.format;
        if (s.aiPortability.dataIncluded) { for (var k in s.aiPortability.dataIncluded) { data.aiPortability.dataIncluded[k] = s.aiPortability.dataIncluded[k]; } }
        if (s.aiPortability.transmissionMethod !== undefined) data.aiPortability.transmissionMethod = s.aiPortability.transmissionMethod;
      }
      if (s.exemptions) { for (var k in s.exemptions) { data.exemptions[k] = s.exemptions[k]; } }
      if (s.logging) {
        if (s.logging.systemOperational !== undefined) data.logging.systemOperational = s.logging.systemOperational;
        if (s.logging.fields) { for (var k in s.logging.fields) { data.logging.fields[k] = s.logging.fields[k]; } }
        if (s.logging.automatedSlaTracking !== undefined) data.logging.automatedSlaTracking = s.logging.automatedSlaTracking;
        if (s.logging.slaBreachAlerts !== undefined) data.logging.slaBreachAlerts = s.logging.slaBreachAlerts;
        if (s.logging.staffTrained !== undefined) data.logging.staffTrained = s.logging.staffTrained;
        if (s.logging.trainingDate !== undefined) data.logging.trainingDate = s.logging.trainingDate;
        if (s.logging.numberTrained !== undefined) data.logging.numberTrained = s.logging.numberTrained;
        if (s.logging.periodicAudit !== undefined) data.logging.periodicAudit = s.logging.periodicAudit;
        if (s.logging.auditFrequency !== undefined) data.logging.auditFrequency = s.logging.auditFrequency;
        if (s.logging.lastAuditDate !== undefined) data.logging.lastAuditDate = s.logging.lastAuditDate;
        if (s.logging.auditFindings !== undefined) data.logging.auditFindings = s.logging.auditFindings;
      }
    }
  });

  // ========== Step 1: Rights Implementation Matrix ==========
  function renderStep1(container) {
    var data = getData();
    container.appendChild(el('h2', {}, ['Step 1: Rights Implementation Matrix']));
    container.appendChild(el('div', { style: 'margin-bottom:16px;color:#9AACBA;font-size:0.9em;' }, ['For each data subject right, indicate whether it is implemented, the response time, and the implementation method. Jurisdiction badges show which laws require each right.']));

    RIGHTS.forEach(function(right, idx) {
      var rData = data.rights[right.id];
      var card = el('div', { className: 'right-card' });

      // Header
      var header = el('div', { className: 'right-header' });
      header.appendChild(el('span', { className: 'right-name' }, [(idx + 1) + '. ' + right.name]));
      card.appendChild(header);

      // Jurisdiction badges
      var badgeRow = el('div', { className: 'badge-row' });
      badgeRow.appendChild(el('span', { style: 'font-size:0.8em;color:#9FC8FF;margin-right:4px;' }, ['Required by:']));
      right.jurisdictions.forEach(function(j) {
        badgeRow.appendChild(el('span', { className: 'badge enacted' }, [j]));
      });
      card.appendChild(badgeRow);

      // Implemented toggle
      card.appendChild(createToggle('Implemented?', rData.implemented, function(val) {
        getData().rights[right.id].implemented = val; wizard.saveNow();
        wizard.refreshStep();
      }));

      // Response time
      card.appendChild(createSelect('Response time', RESPONSE_TIME_OPTIONS, rData.responseTime, function(val) {
        getData().rights[right.id].responseTime = val;
      }));

      // Implementation method
      card.appendChild(createTextInput('Implementation method', rData.method, function(val) {
        getData().rights[right.id].method = val;
      }, 'Describe how this right is fulfilled...'));

      // Warning if not implemented
      if (rData.implemented === false) {
        var jCount = right.jurisdictions.length;
        var severity = jCount >= 6 ? 'inline-critical' : 'inline-warning';
        var sevText = jCount >= 6 ? 'CRITICAL' : 'WARNING';
        card.appendChild(el('span', { className: severity }, [sevText + ': Not implemented \u2014 required by ' + jCount + ' jurisdiction(s): ' + right.jurisdictions.join(', ')]));
      }

      container.appendChild(card);
    });

    // Implementation score
    var implemented = getRightsImplementedCount();
    var pct = Math.round((implemented / RIGHTS.length) * 100);
    container.appendChild(buildScoreBar(pct, 'Implementation Score: ' + implemented + '/' + RIGHTS.length + ' rights implemented'));
  }

  // ========== Step 2: Request Handling Infrastructure ==========
  function renderStep2(container) {
    var data = getData();
    container.appendChild(el('h2', {}, ['Step 2: Request Handling Infrastructure']));

    // --- Request Intake Channels ---
    var sub1 = el('div', { className: 'subsection' });
    sub1.appendChild(el('div', { className: 'subsection-title' }, ['Request Intake Channels']));
    container.appendChild(sub1);

    // Online form
    var chOnline = el('div', { className: 'channel-card' });
    chOnline.appendChild(el('div', { className: 'channel-name' }, ['Online form / portal']));
    chOnline.appendChild(createToggle('Available?', data.channels.onlineForm.enabled, function(val) {
      getData().channels.onlineForm.enabled = val; wizard.refreshStep();
    }));
    if (data.channels.onlineForm.enabled === true) {
      chOnline.appendChild(createTextInput('Portal URL', data.channels.onlineForm.url, function(val) {
        getData().channels.onlineForm.url = val;
      }, 'https://...'));
    }
    container.appendChild(chOnline);

    // Email
    var chEmail = el('div', { className: 'channel-card' });
    chEmail.appendChild(el('div', { className: 'channel-name' }, ['Email address']));
    chEmail.appendChild(createToggle('Available?', data.channels.email.enabled, function(val) {
      getData().channels.email.enabled = val; wizard.refreshStep();
    }));
    if (data.channels.email.enabled === true) {
      chEmail.appendChild(createTextInput('Email address', data.channels.email.address, function(val) {
        getData().channels.email.address = val;
      }, 'privacy@example.com'));
    }
    container.appendChild(chEmail);

    // In-app
    var chApp = el('div', { className: 'channel-card' });
    chApp.appendChild(el('div', { className: 'channel-name' }, ['In-app mechanism']));
    chApp.appendChild(createToggle('Available?', data.channels.inApp.enabled, function(val) {
      getData().channels.inApp.enabled = val; wizard.refreshStep();
    }));
    if (data.channels.inApp.enabled === true) {
      chApp.appendChild(createTextInput('Description', data.channels.inApp.description, function(val) {
        getData().channels.inApp.description = val;
      }, 'Describe the in-app mechanism...'));
    }
    container.appendChild(chApp);

    // Physical mail
    var chMail = el('div', { className: 'channel-card' });
    chMail.appendChild(el('div', { className: 'channel-name' }, ['Physical mail']));
    chMail.appendChild(createToggle('Available?', data.channels.physicalMail.enabled, function(val) {
      getData().channels.physicalMail.enabled = val; wizard.refreshStep();
    }));
    container.appendChild(chMail);

    // Phone
    var chPhone = el('div', { className: 'channel-card' });
    chPhone.appendChild(el('div', { className: 'channel-name' }, ['Phone']));
    chPhone.appendChild(createToggle('Available?', data.channels.phone.enabled, function(val) {
      getData().channels.phone.enabled = val; wizard.refreshStep();
    }));
    container.appendChild(chPhone);

    // Channel count warning
    var channelCount = getChannelCount();
    if (channelCount < 2) {

    else ratingDesc = 'Critical rights missing or no logging system operational.';
    ratingDiv.appendChild(el('div', { style: 'font-size:0.85em;color:#9AACBA;margin-top:6px;' }, [ratingDesc]));
    container.appendChild(ratingDiv);

    // --- Per-Jurisdiction Compliance ---
    var sub1 = el('div', { className: 'subsection' });
    sub1.appendChild(el('div', { className: 'subsection-title' }, ['Per-Jurisdiction Compliance Status']));
    container.appendChild(sub1);

    var allJurisdictions = ['EU','UK','India','Brazil','S.Africa','Canada','Australia','S.Korea'];
    allJurisdictions.forEach(function(jur) {
      var missing = [];
      RIGHTS.forEach(function(r) {
        if (r.jurisdictions.indexOf(jur) >= 0 && data.rights[r.id].implemented !== true) {
          missing.push(r.name);
        }
      });
      var status, statusClass;
      if (missing.length === 0) { status = 'PASS'; statusClass = 'jurisdiction-status pass'; }
      else if (missing.length <= 2) { status = 'PARTIAL'; statusClass = 'jurisdiction-status warn'; }
      else { status = 'FAIL'; statusClass = 'jurisdiction-status fail'; }

      var row = el('div', { className: 'jurisdiction-row' });
      row.appendChild(el('span', {}, [jur]));
      var statusEl = el('span', { className: statusClass });
      if (missing.length > 0) {
        statusEl.textContent = status + ' \u2014 missing: ' + missing.join(', ');
      } else {
        statusEl.textContent = status;
      }
      row.appendChild(statusEl);
      container.appendChild(row);
    });

    // --- Remediation List ---
    var remediations = buildRemediations();
    if (remediations.length > 0) {
      var sub2 = el('div', { className: 'subsection' });
      sub2.appendChild(el('div', { className: 'subsection-title' }, ['Auto-Generated Remediation List']));
      container.appendChild(sub2);

      remediations.forEach(function(r) {
        container.appendChild(el('div', { className: 'remediation-item' }, [r]));
      });
    } else {
      container.appendChild(createAlert('success', 'No remediation items identified. All checks passed.'));
    }

    // Bottom action buttons
    var bottomToolbar = el('div', { className: 'toolbar', style: 'margin-top:24px;' });
    bottomToolbar.appendChild(el('button', { className: 'btn primary', onClick: function() { doExportMarkdown(); }}, ['Export Markdown']));
    bottomToolbar.appendChild(el('button', { className: 'btn', onClick: function() { saveConfigToFile(config); }}, ['Save Config']));
    container.appendChild(bottomToolbar);
  }

  // --- Remediation Builder ---
  function buildRemediations() {
    var data = getData();
    var items = [];

    // Critical rights
    var criticalRights = ['informed','access','rectification','erasure','withdrawConsent'];
    RIGHTS.forEach(function(r) {
      if (data.rights[r.id].implemented === false) {
        var isCritical = criticalRights.indexOf(r.id) >= 0;
        var prefix = isCritical ? '[CRITICAL]' : '[HIGH]';
        items.push(prefix + ' Implement ' + r.name + ' (required by ' + r.jurisdictions.join(', ') + ')');
      }
    });

    // Channels
    if (getChannelCount() < 2) {
      items.push('[HIGH] Add additional request intake channels (currently ' + getChannelCount() + ', need at least 2)');
    }

    // Identity verification
    if (!data.identity.method) {
      items.push('[HIGH] Define identity verification method for DSR requests');
    }
    if (data.identity.overCollectionAddressed === false) {
      items.push('[MEDIUM] Address over-collection risk in identity verification (GDPR data minimisation)');
    }
    if (data.identity.failedVerificationFallback === false) {
      items.push('[MEDIUM] Document failed verification fallback procedure');
    }

    // SLAs
    if (!data.sla.acknowledgeReceipt) items.push('[MEDIUM] Set SLA for acknowledging receipt of DSR requests');
    if (!data.sla.executeRequest) items.push('[HIGH] Set SLA for executing DSR requests');
    if (data.sla.notifyOutcome === '45_days' || data.sla.notifyOutcome === '60_days') {
      items.push('[HIGH] Reduce outcome notification SLA to 30 days or less for EU/UK compliance');
    }

    // AI erasure
    if (!data.aiErasure.trainingSet.method) items.push('[HIGH] Define approach for erasure of data in AI training sets');
    if (data.aiErasure.memorized.evaluated !== true) items.push('[HIGH] Evaluate AI model for data memorization risks');
    if (data.aiErasure.logsCaches.purgeExists !== true) items.push('[MEDIUM] Implement log and cache purge procedures');
    if (data.aiErasure.backups.purgeSchedule !== true) items.push('[MEDIUM] Define backup purge schedule for erased data');
    if (data.aiErasure.thirdParty.notificationProcedure !== true) items.push('[HIGH] Implement third-party erasure notification procedure');

    // Automated decisions
    if (!data.aiAutomated.humanReviewHow) items.push('[HIGH] Define process for users to request human review of automated decisions');
    if (data.aiAutomated.canOverturn === 'no') items.push('[CRITICAL] Enable ability to overturn automated decisions (GDPR Art. 22)');
    if (data.aiAutomated.explanationProvided !== true) items.push('[HIGH] Provide explanation of automated decision logic');

    // Logging
    if (data.logging.systemOperational === false) items.push('[CRITICAL] Implement DSR request logging system');
    if (getLogFieldsCount() < 6) items.push('[HIGH] Capture at least 6/8 recommended log fields (currently ' + getLogFieldsCount() + ')');
    if (data.logging.automatedSlaTracking !== true) items.push('[MEDIUM] Implement automated SLA tracking');
    if (data.logging.slaBreachAlerts !== true) items.push('[MEDIUM] Configure SLA breach alerts');
    if (data.logging.staffTrained !== true) items.push('[HIGH] Train staff on DSR request handling');
    if (data.logging.periodicAudit !== true) items.push('[MEDIUM] Schedule periodic DSR compliance audits');
    if (data.logging.auditFindings !== true) items.push('[MEDIUM] Document audit findings');

    // Exemptions
    EXEMPTIONS.forEach(function(ex) {
      if (data.exemptions[ex.id].policyExists === false) {
        items.push('[MEDIUM] Document exemption policy for: ' + ex.name + ' (' + ex.scope + ')');
      }
    });

    return items;
  }

  // --- Markdown Export ---
  function doExportMarkdown() {
    var data = getData();
    var rating = getOverallRating();
    var rightsCount = getRightsImplementedCount();
    var channelCount = getChannelCount();
    var erasureCount = getErasureMethodsAddressed();
    var exCount = getExemptionsDocumented();
    var logCount = getLogFieldsCount();

    var lines = [];
    lines.push('# Data Subject Rights Implementation Report');
    lines.push('');
    lines.push('**Template:** 11 - Data Subject Rights Implementation');
    lines.push('**Generated:** ' + new Date().toISOString().split('T')[0]);
    lines.push('**Overall Rating:** ' + rating);
    lines.push('');

    // Step 1
    lines.push('## 1. Rights Implementation Matrix');
    lines.push('');
    lines.push('**Implemented:** ' + rightsCount + '/10 rights');
    lines.push('');
    lines.push('| # | Right | Implemented | Response Time | Method | Jurisdictions |');
    lines.push('|---|-------|-------------|---------------|--------|---------------|');
    RIGHTS.forEach(function(r, idx) {
      var rd = data.rights[r.id];
      var impl = rd.implemented === true ? 'Yes' : rd.implemented === false ? 'No' : 'N/A';
      var time = rd.responseTime || 'Not set';
      var method = rd.method || 'Not set';
      lines.push('| ' + (idx + 1) + ' | ' + r.name + ' | ' + impl + ' | ' + time + ' | ' + method + ' | ' + r.jurisdictions.join(', ') + ' |');
    });
    lines.push('');

    // Step 2
    lines.push('## 2. Request Handling Infrastructure');
    lines.push('');
    lines.push('### Request Channels (' + channelCount + ' available)');
    var ch = data.channels;
    lines.push('- Online form/portal: ' + fmtBool(ch.onlineForm.enabled) + (ch.onlineForm.url ? ' (' + ch.onlineForm.url + ')' : ''));
    lines.push('- Email: ' + fmtBool(ch.email.enabled) + (ch.email.address ? ' (' + ch.email.address + ')' : ''));
    lines.push('- In-app: ' + fmtBool(ch.inApp.enabled) + (ch.inApp.description ? ' (' + ch.inApp.description + ')' : ''));
    lines.push('- Physical mail: ' + fmtBool(ch.physicalMail.enabled));
    lines.push('- Phone: ' + fmtBool(ch.phone.enabled));
    lines.push('');
    lines.push('### Identity Verification');
    lines.push('- Method: ' + (data.identity.method || 'Not set'));
    lines.push('- Over-collection risk addressed: ' + fmtBool(data.identity.overCollectionAddressed));
    lines.push('- Failed verification fallback: ' + fmtBool(data.identity.failedVerificationFallback));
    lines.push('');
    lines.push('### SLAs');
    lines.push('- Acknowledge receipt: ' + (data.sla.acknowledgeReceipt || 'Not set'));
    lines.push('- Verify identity: ' + (data.sla.verifyIdentity || 'Not set'));
    lines.push('- Execute request: ' + (data.sla.executeRequest || 'Not set'));
    lines.push('- Notify outcome: ' + (data.sla.notifyOutcome || 'Not set'));
    lines.push('');

    // Step 3
    lines.push('## 3. AI-Specific Challenges');
    lines.push('');
    lines.push('### Erasure in AI Systems (' + erasureCount + '/5 addressed)');
    lines.push('- Training set: ' + (data.aiErasure.trainingSet.method || 'Not set') + (data.aiErasure.trainingSet.details ? ' \u2014 ' + data.aiErasure.trainingSet.details : ''));
    lines.push('- Model memorization evaluated: ' + fmtBool(data.aiErasure.memorized.evaluated) + (data.aiErasure.memorized.mitigation ? ' \u2014 ' + data.aiErasure.memorized.mitigation : ''));
    lines.push('- Log/cache purge: ' + fmtBool(data.aiErasure.logsCaches.purgeExists) + (data.aiErasure.logsCaches.details ? ' \u2014 ' + data.aiErasure.logsCaches.details : ''));
    lines.push('- Backup purge: ' + fmtBool(data.aiErasure.backups.purgeSchedule) + (data.aiErasure.backups.details ? ' \u2014 ' + data.aiErasure.backups.details : ''));
    lines.push('- Third-party notification: ' + fmtBool(data.aiErasure.thirdParty.notificationProcedure) + (data.aiErasure.thirdParty.details ? ' \u2014 ' + data.aiErasure.thirdParty.details : ''));
    lines.push('');
    lines.push('### Automated Decision Review');
    lines.push('- Human review process: ' + (data.aiAutomated.humanReviewHow || 'Not set'));
    lines.push('- Reviewer: ' + (data.aiAutomated.reviewerRole || 'Not set'));
    lines.push('- Review turnaround: ' + (data.aiAutomated.reviewTurnaround || 'Not set'));
    lines.push('- Can overturn: ' + (data.aiAutomated.canOverturn || 'Not set'));
    lines.push('- Explanation provided: ' + fmtBool(data.aiAutomated.explanationProvided));
    lines.push('');
    lines.push('### Data Portability');
    lines.push('- Format: ' + (data.aiPortability.format || 'Not set'));
    var included = [];
    if (data.aiPortability.dataIncluded.input) included.push('Input data');
    if (data.aiPortability.dataIncluded.profile) included.push('Profile data');
    if (data.aiPortability.dataIncluded.interaction) included.push('Interaction history');
    if (data.aiPortability.dataIncluded.aiOutputs) included.push('AI outputs');
    lines.push('- Data included: ' + (included.length > 0 ? included.join(', ') : 'None selected'));
    lines.push('- Transmission: ' + (data.aiPortability.transmissionMethod || 'Not set'));
    lines.push('');

    // Step 4
    lines.push('## 4. Exemptions Framework');
    lines.push('');
    lines.push('**Documented:** ' + exCount + '/' + EXEMPTIONS.length);
    lines.push('');
    EXEMPTIONS.forEach(function(ex) {
      var exData = data.exemptions[ex.id];
      lines.push('### ' + ex.name + ' (' + ex.scope + ')');
      lines.push('- Policy exists: ' + fmtBool(exData.policyExists));
      if (exData.policyExists === true) {
        lines.push('- How invoked: ' + (exData.howInvoked || 'Not set'));
        lines.push('- Who decides: ' + (exData.whoDecides || 'Not set'));
        lines.push('- Written justification required: ' + fmtBool(exData.writtenJustification));
      }
      lines.push('');
    });

    // Step 5
    lines.push('## 5. Logging & Audit');
    lines.push('');
    lines.push('- Log system operational: ' + fmtBool(data.logging.systemOperational));
    lines.push('- Log fields captured: ' + logCount + '/8');
    LOG_FIELDS.forEach(function(f) {
      lines.push('  - ' + f.name + ': ' + fmtBool(data.logging.fields[f.id]));
    });
    lines.push('- Automated SLA tracking: ' + fmtBool(data.logging.automatedSlaTracking));
    lines.push('- SLA breach alerts: ' + fmtBool(data.logging.slaBreachAlerts));
    lines.push('- Staff trained: ' + fmtBool(data.logging.staffTrained) + (data.logging.staffTrained === true ? ' (' + (data.logging.numberTrained || '?') + ' staff, ' + (data.logging.trainingDate || 'date not set') + ')' : ''));
    lines.push('- Periodic audit: ' + fmtBool(data.logging.periodicAudit) + (data.logging.periodicAudit === true ? ' (' + (data.logging.auditFrequency || 'frequency not set') + ')' : ''));
    lines.push('- Last audit date: ' + (data.logging.lastAuditDate || 'Not set'));
    lines.push('- Audit findings documented: ' + fmtBool(data.logging.auditFindings));
    lines.push('');

    // Step 6
    lines.push('## 6. Compliance Summary');
    lines.push('');
    lines.push('| Metric | Status |');
    lines.push('|--------|--------|');
    lines.push('| Rights implemented | ' + rightsCount + '/10 |');
    lines.push('| Request channels | ' + channelCount + ' |');
    lines.push('| AI erasure methods | ' + erasureCount + '/5 |');
    lines.push('| Exemptions documented | ' + exCount + '/5 |');
    lines.push('| Log fields captured | ' + logCount + '/8 |');
    lines.push('| Staff training | ' + fmtBool(data.logging.staffTrained) + ' |');
    lines.push('| Audit scheduled | ' + fmtBool(data.logging.periodicAudit) + ' |');
    lines.push('| **Overall Rating** | **' + rating + '** |');
    lines.push('');

    // Per-jurisdiction
    lines.push('### Per-Jurisdiction Status');
    lines.push('');
    var allJurisdictions = ['EU','UK','India','Brazil','S.Africa','Canada','Australia','S.Korea'];
    allJurisdictions.forEach(function(jur) {
      var missing = [];
      RIGHTS.forEach(function(r) {
        if (r.jurisdictions.indexOf(jur) >= 0 && data.rights[r.id].implemented !== true) {
          missing.push(r.name);
        }
      });
      var status = missing.length === 0 ? 'PASS' : missing.length <= 2 ? 'PARTIAL' : 'FAIL';
      lines.push('- **' + jur + ':** ' + status + (missing.length > 0 ? ' \u2014 missing: ' + missing.join(', ') : ''));
    });
    lines.push('');

    // Remediations
    var remediations = buildRemediations();
    if (remediations.length > 0) {
      lines.push('## Remediation Actions');
      lines.push('');
      remediations.forEach(function(r) { lines.push('- ' + r); });
      lines.push('');
    }

    lines.push('---');
    lines.push('*This is a compliance research tool, not legal advice. Consult qualified legal counsel for binding compliance determinations.*');

    exportMarkdown('dsr-rights-implementation.md', lines.join('\n'));
  }

  function fmtBool(v) {
    if (v === true) return 'Yes';
    if (v === false) return 'No';
    return 'Not assessed';
  }

  // Init
  wizard.render();
})();
</script>
</body>
</html>
