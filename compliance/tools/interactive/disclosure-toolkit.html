<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User-Facing Disclosure Toolkit (Template 02)</title>
<script src="./shared.js"></script>
</head>
<body>
<a class="skip-nav" href="#main">Skip to content</a>

<script>
(function() {
  injectCSS();

  var config = {};

  var disclosureTypes = [
    { id: 'aiInteraction', label: 'AI Interaction Notice', badges: [
      { text: 'EU Art. 50(1)', cls: 'enacted' }, { text: 'South Korea', cls: 'enacted' }, { text: 'Colorado', cls: 'active-sector' }, { text: 'Illinois AIVIA', cls: 'active-sector' }
    ]},
    { id: 'contentLabel', label: 'AI-Generated Content Label', badges: [
      { text: 'EU Art. 50(2)', cls: 'enacted' }, { text: 'China GenAI', cls: 'enacted' }, { text: 'California SB 942', cls: 'active-sector' }
    ]},
    { id: 'metadataWatermark', label: 'Metadata / Watermark', badges: [
      { text: 'EU Art. 50(2)', cls: 'enacted' }, { text: 'China Deep Synthesis', cls: 'enacted' }, { text: 'California SB 942', cls: 'active-sector' }
    ]},
    { id: 'automatedDecision', label: 'Automated Decision Notice', badges: [
      { text: 'Colorado', cls: 'active-sector' }, { text: 'NYC LL 144', cls: 'enacted' }, { text: 'Illinois AIVIA', cls: 'active-sector' }
    ]},
    { id: 'emotionRecognition', label: 'Emotion Recognition Notice', badges: [
      { text: 'EU Art. 50(3)', cls: 'enacted' }, { text: 'Illinois BIPA', cls: 'enacted' }
    ]},
    { id: 'aiVideoInterview', label: 'AI Video Interview Notice', badges: [
      { text: 'Illinois AIPA', cls: 'enacted' }, { text: 'NYC LL 144', cls: 'enacted' }
    ]},
    { id: 'deepfakeSynthetic', label: 'Deepfake / Synthetic Media Label', badges: [
      { text: 'EU Art. 50(4)', cls: 'enacted' }, { text: 'China Deep Synthesis', cls: 'enacted' }, { text: 'California SB 942', cls: 'active-sector' }
    ]},
    { id: 'optOutHuman', label: 'Opt-Out / Human Alternative', badges: [
      { text: 'Colorado', cls: 'active-sector' }, { text: 'Illinois AIVIA', cls: 'active-sector' }, { text: 'South Korea', cls: 'enacted' }
    ]},
    { id: 'appealContest', label: 'Appeal / Contest Mechanism', badges: [
      { text: 'EU AI Act', cls: 'enacted' }, { text: 'Colorado', cls: 'active-sector' }, { text: 'NYC LL 144', cls: 'enacted' }
    ]}
  ];

  var defaultCopy = {
    aiInteraction: { short: 'You are interacting with an AI system.', standard: 'This service is powered by artificial intelligence. A human agent is available upon request.', detailed: 'This interaction is conducted by an AI system developed by [Company]. The system processes your inputs to generate responses. You may request a human agent at any time by [method].' },
    contentLabel: { short: 'AI-generated content.', standard: 'This content was generated by an AI system and may contain inaccuracies.', detailed: 'This content was generated by an AI system ([model name]). AI-generated content may not be fully accurate. Please verify important information independently.' },
    metadataWatermark: { short: 'Contains AI metadata.', standard: 'This content includes embedded metadata identifying it as AI-generated.', detailed: 'This content embeds machine-readable metadata per [standard] indicating AI generation by [system name] on [date].' },
    automatedDecision: { short: 'This decision was made with AI assistance.', standard: 'An automated system contributed to this decision. You may request human review.', detailed: 'This decision was made with the assistance of an automated decision system. Key factors considered include [factors]. You have the right to request human review by contacting [contact].' },
    emotionRecognition: { short: 'Emotion analysis is active.', standard: 'This system analyzes emotional indicators. You may opt out at any time.', detailed: 'This system uses AI to analyze emotional indicators from [data types]. This analysis is used for [purpose]. You may opt out by [method].' },
    aiVideoInterview: { short: 'AI is used to evaluate this interview.', standard: 'AI technology analyzes your video interview. You may request an alternative process.', detailed: 'This video interview is analyzed by AI technology that evaluates [criteria]. You have the right to request an alternative interview process by contacting [contact] within [timeframe].' },
    deepfakeSynthetic: { short: 'Synthetic media.', standard: 'This media was generated or substantially modified by AI.', detailed: 'This [media type] was [generated/modified] using AI technology. It does not depict real events. Original source: [source].' },
    optOutHuman: { short: 'Request human review.', standard: 'You may opt out of AI processing and request a human alternative.', detailed: 'You have the right to opt out of AI-assisted processing. To request human review, [method]. Processing time for human review may be [timeframe].' },
    appealContest: { short: 'Contest this decision.', standard: 'You may appeal this AI-assisted decision by contacting [contact].', detailed: 'You have the right to contest this AI-assisted decision. To file an appeal: [process]. Expected response time: [timeframe]. Your appeal will be reviewed by [reviewer].' }
  };

  var checklistPhases = {
    design: [
      'Disclosure language reviewed by legal counsel',
      'Plain language readability confirmed (8th grade level or below)',
      'Placement locations identified for each disclosure',
      'Multilingual requirements assessed',
      'Accessibility requirements met (WCAG 2.1 AA)'
    ],
    coding: [
      'Disclosure components implemented in UI framework',
      'Opt-out mechanism functional and tested',
      'Appeal/contest workflow implemented end-to-end',
      'Metadata embedding pipeline operational',
      'Disclosure state persisted and auditable'
    ],
    testing: [
      'Disclosure visible on all supported platforms/browsers',
      'Disclosure appears before AI interaction begins',
      'Opt-out successfully prevents AI processing',
      'Appeal mechanism delivers request to review queue',
      'Metadata survives file format conversions',
      'End-to-end user acceptance testing completed'
    ]
  };

  var state = {
    requirements: {},
    copyDesign: {},
    checklist: { design: {}, coding: {}, testing: {} },
    evidenceLog: []
  };

  function initState() {
    for (var i = 0; i < disclosureTypes.length; i++) {
      var d = disclosureTypes[i];
      if (!state.requirements[d.id]) state.requirements[d.id] = { applies: null, implemented: null };
      if (!state.copyDesign[d.id]) state.copyDesign[d.id] = { variation: '', copyText: '', placement: '', allLanguages: null };
    }
  }
  initState();

  var wizard = createWizard({
    title: 'User-Facing Disclosure Toolkit',
    subtitle: 'Template 02 \u2014 EU Art. 50; South Korea; China GenAI; Utah; California SB 942; Colorado; NYC LL 144; Illinois AIVIA',
    totalSteps: 5,
    stepLabels: ['Requirements', 'Copy Design', 'Checklist', 'Evidence Log', 'Summary'],
    renderStep: function(step, container) {
      if (step === 0) renderStep1(container);
      else if (step === 1) renderStep2(container);
      else if (step === 2) renderStep3(container);
      else if (step === 3) renderStep4(container);
      else if (step === 4) renderSummary(container);
    },
    onLoad: function() {
      loadConfigFromFile(function(c) { config = c; loadState(); wizard.refreshStep(); });
    },
    onSave: doSave,
    onExport: doExport,
    stateKey: 'disclosureToolkit',
    getState: function() { return state; },
    setState: function(s) {
      if (s.requirements) state.requirements = s.requirements;
      if (s.copyDesign) state.copyDesign = s.copyDesign;
      if (s.checklist) state.checklist = s.checklist;
      if (s.evidenceLog) state.evidenceLog = s.evidenceLog;
      initState();
    }
  });

  function renderStep1(container) {
    var section = el('div', { className: 'section' });
    section.appendChild(el('h2', {}, ['Step 1: Disclosure Requirements Matrix']));
    section.appendChild(createAlert('info', 'Identify which disclosure types apply to your system and whether they have been implemented.'));
    for (var i = 0; i < disclosureTypes.length; i++) {
      (function(dt) {
        var req = state.requirements[dt.id];
        var group = el('div', { style: 'margin-bottom: 12px; padding: 12px; border: 1px solid #1E2D3D; border-radius: 4px; background: #0D1830;' });
        group.appendChild(el('h3', {}, [dt.label]));
        var badgeRow = el('div', { style: 'margin-bottom: 8px;' });
        for (var b = 0; b < dt.badges.length; b++) {
          badgeRow.appendChild(el('span', { className: 'badge ' + dt.badges[b].cls }, [dt.badges[b].text]));
        }
        group.appendChild(badgeRow);
        group.appendChild(createToggle('Applies to your system?', req.applies, function(v) { req.applies = v; wizard.saveNow(); }));
        group.appendChild(createToggle('Implemented?', req.implemented, function(v) { req.implemented = v; wizard.saveNow(); }));
        section.appendChild(group);
      })(disclosureTypes[i]);
    }
    container.appendChild(section);
  }

  function renderStep2(container) {
    var section = el('div', { className: 'section' });
    section.appendChild(el('h2', {}, ['Step 2: Disclosure Copy Design']));
    section.appendChild(createAlert('info', 'For each applicable disclosure, design the user-facing copy. Select a variation to pre-populate a suggestion.'));
    var anyApplicable = false;
    for (var i = 0; i < disclosureTypes.length; i++) {
      (function(dt) {
        var req = state.requirements[dt.id];
        if (req.applies !== true) return;
        anyApplicable = true;
        var cd = state.copyDesign[dt.id];
        var group = el('div', { style: 'margin-bottom: 16px; padding: 12px; border: 1px solid #1E2D3D; border-radius: 4px; background: #0D1830;' });
        group.appendChild(el('h3', {}, [dt.label]));
        group.appendChild(createSelect('Copy variation', [
          { value: '', label: '-- Select --' }, { value: 'short', label: 'Short' },
          { value: 'standard', label: 'Standard' }, { value: 'detailed', label: 'Detailed' }
        ], cd.variation, function(v) {
          cd.variation = v;
          if (v && defaultCopy[dt.id] && defaultCopy[dt.id][v] && !cd.copyText) {
            cd.copyText = defaultCopy[dt.id][v];
          }
          wizard.refreshStep();
        }));
        group.appendChild(createTextArea('Actual copy text', cd.copyText, function(v) { cd.copyText = v; }, 'Enter the disclosure text shown to users'));
        group.appendChild(createTextInput('Placement location', cd.placement, function(v) { cd.placement = v; }, 'e.g. Modal dialog, banner, footer, in-chat'));
        group.appendChild(createToggle('Available in all required languages?', cd.allLanguages, function(v) { cd.allLanguages = v; wizard.saveNow(); }));
        section.appendChild(group);
      })(disclosureTypes[i]);
    }
    if (!anyApplicable) {
      section.appendChild(createAlert('warning', 'No disclosure types marked as applicable. Go back to Step 1 to identify applicable disclosures.'));
    }
    container.appendChild(section);
  }

  function renderStep3(container) {
    var section = el('div', { className: 'section' });
    section.appendChild(el('h2', {}, ['Step 3: Implementation Checklist']));
    section.appendChild(createAlert('info', 'Track implementation progress across design, coding, and testing phases.'));
    var phases = [
      { id: 'design', label: 'Design Phase', items: checklistPhases.design },
      { id: 'coding', label: 'Coding Phase', items: checklistPhases.coding },
      { id: 'testing', label: 'Testing Phase', items: checklistPhases.testing }
    ];
    for (var p = 0; p < phases.length; p++) {
      (function(phase) {
        var phaseSection = el('div', { style: 'margin-bottom: 16px;' });
        phaseSection.appendChild(el('h3', {}, [phase.label]));
        for (var j = 0; j < phase.items.length; j++) {
          (function(item, idx) {
            var key = phase.id + '_' + idx;
            var checked = state.checklist[phase.id][key] || false;
            var cb = el('input', { type: 'checkbox' });
            cb.checked = checked;
            cb.addEventListener('change', function() { state.checklist[phase.id][key] = cb.checked; wizard.saveNow(); });
            var row = el('div', { className: 'checklist-item' });
            row.appendChild(cb);
            row.appendChild(el('label', {}, [item]));
            phaseSection.appendChild(row);
          })(phase.items[j], j);
        }
        section.appendChild(phaseSection);
      })(phases[p]);
    }
    container.appendChild(section);
  }

  function renderStep4(container) {
    var section = el('div', { className: 'section' });
    section.appendChild(el('h2', {}, ['Step 4: Evidence Log']));
    section.appendChild(createAlert('info', 'Document evidence of each disclosure implementation for audit purposes.'));
    for (var i = 0; i < state.evidenceLog.length; i++) {
      (function(idx) {
        var entry = state.evidenceLog[idx];
        var group = el('div', { style: 'margin-bottom: 12px; padding: 12px; border: 1px solid #1E2D3D; border-radius: 4px; background: #0D1830;' });
        var header = el('div', { style: 'display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;' });
        header.appendChild(el('h3', {}, ['Evidence Entry ' + (idx + 1)]));
        header.appendChild(el('button', { className: 'btn', textContent: 'Remove', style: 'padding: 4px 12px; font-size: 0.75em;', onClick: function() {
          state.evidenceLog.splice(idx, 1); wizard.refreshStep();
        }}));
        group.appendChild(header);
        var typeOpts = [{ value: '', label: '-- Select type --' }];
        for (var d = 0; d < disclosureTypes.length; d++) {
          typeOpts.push({ value: disclosureTypes[d].id, label: disclosureTypes[d].label });
        }
        group.appendChild(createSelect('Disclosure type', typeOpts, entry.type, function(v) { entry.type = v; }));
        group.appendChild(createTextInput('Location (URL / Screen)', entry.location, function(v) { entry.location = v; }, 'e.g. https://app.example.com/chat'));
        group.appendChild(createTextInput('Screenshot reference', entry.screenshot, function(v) { entry.screenshot = v; }, 'e.g. evidence/disclosure-notice-v2.png'));
        var dateRow = el('div', { className: 'field-row' });
        dateRow.appendChild(el('label', { className: 'field-label' }, ['Date verified']));
        var dateInput = el('input', { type: 'date', className: 'field-input', value: entry.dateVerified || '' });
        dateInput.addEventListener('change', function() { entry.dateVerified = dateInput.value; });
        dateRow.appendChild(dateInput);
        group.appendChild(dateRow);
        group.appendChild(createTextInput('Verified by', entry.verifiedBy, function(v) { entry.verifiedBy = v; }, 'Name of verifier'));
        section.appendChild(group);
      })(i);
    }
    section.appendChild(el('button', { className: 'btn', textContent: '+ Add Evidence Entry', onClick: function() {
      state.evidenceLog.push({ type: '', location: '', screenshot: '', dateVerified: '', verifiedBy: '' }); wizard.refreshStep();
    }}));
    container.appendChild(section);
  }

  function renderSummary(container) {
    var section = el('div', { className: 'section' });
    section.appendChild(el('h2', {}, ['Step 5: Summary']));
    var applicableCount = 0; var implementedCount = 0;
    for (var i = 0; i < disclosureTypes.length; i++) {
      var req = state.requirements[disclosureTypes[i].id];
      if (req.applies === true) { applicableCount++; if (req.implemented === true) implementedCount++; }
    }
    var phases = ['design', 'coding', 'testing'];
    var phaseCounts = {}; var totalChecked = 0; var totalItems = 0;
    for (var p = 0; p < phases.length; p++) {
      var pId = phases[p]; var items = checklistPhases[pId]; var checked = 0;
      for (var j = 0; j < items.length; j++) { if (state.checklist[pId][pId + '_' + j]) checked++; }
      phaseCounts[pId] = { checked: checked, total: items.length };
      totalChecked += checked; totalItems += items.length;
    }
    var table = el('table', { className: 'result-table' });
    var thead = el('thead'); var headerRow = el('tr');
    headerRow.appendChild(el('th', {}, ['Metric']));
    headerRow.appendChild(el('th', {}, ['Value']));
    headerRow.appendChild(el('th', {}, ['Status']));
    thead.appendChild(headerRow); table.appendChild(thead);
    var tbody = el('tbody');
    var discPct = applicableCount > 0 ? Math.round((implementedCount / applicableCount) * 100) : 0;
    addRow(tbody, 'Applicable disclosures', applicableCount + ' identified', '');
    addRow(tbody, 'Implemented disclosures', implementedCount + ' / ' + applicableCount, discPct >= 80 ? 'score-low' : discPct >= 50 ? 'score-med' : 'score-high');
    for (var p = 0; p < phases.length; p++) {
      var pId = phases[p]; var pc = phaseCounts[pId];
      var pPct = pc.total > 0 ? Math.round((pc.checked / pc.total) * 100) : 0;
      addRow(tbody, pId.charAt(0).toUpperCase() + pId.slice(1) + ' checklist', pc.checked + ' / ' + pc.total, pPct >= 80 ? 'score-low' : pPct >= 50 ? 'score-med' : 'score-high');
    }
    addRow(tbody, 'Evidence log entries', state.evidenceLog.length + ' entries', state.evidenceLog.length > 0 ? 'score-low' : 'score-high');
    var overallPct = 0; var overallParts = 0; var overallSum = 0;
    if (applicableCount > 0) { overallSum += discPct; overallParts++; }
    if (totalItems > 0) { overallSum += Math.round((totalChecked / totalItems) * 100); overallParts++; }
    if (overallParts > 0) overallPct = Math.round(overallSum / overallParts);
    addRow(tbody, 'Overall score', overallPct + '%', overallPct >= 80 ? 'score-low' : overallPct >= 50 ? 'score-med' : 'score-high');
    table.appendChild(tbody); section.appendChild(table);
    if (overallPct < 50) section.appendChild(createAlert('danger', 'Disclosure implementation is incomplete. Address missing disclosures before deployment.'));
    else if (overallPct < 80) section.appendChild(createAlert('warning', 'Disclosure implementation is in progress. Complete remaining items for full compliance.'));
    else section.appendChild(createAlert('success', 'Disclosure implementation is substantially complete. Proceed to legal review.'));
    var exportBar = el('div', { className: 'toolbar', style: 'margin-top: 16px;' });
    exportBar.appendChild(el('button', { className: 'btn primary', textContent: 'Export Markdown', onClick: doExport }));
    exportBar.appendChild(el('button', { className: 'btn success', textContent: 'Save Config', onClick: doSave }));
    section.appendChild(exportBar);
    container.appendChild(section);
  }

  function addRow(tbody, metric, value, scoreCls) {
    var row = el('tr');
    row.appendChild(el('td', {}, [metric]));
    row.appendChild(el('td', {}, [value]));
    var statusCell = el('td');
    if (scoreCls) {
      var lbl = scoreCls === 'score-low' ? 'Good' : scoreCls === 'score-med' ? 'Partial' : 'Needs work';
      statusCell.appendChild(el('span', { className: scoreCls }, [lbl]));
    }
    row.appendChild(statusCell); tbody.appendChild(row);
  }

  function loadState() {
    if (config.interactiveToolResults && config.interactiveToolResults.disclosureToolkit) {
      var saved = config.interactiveToolResults.disclosureToolkit;
      if (saved.requirements) state.requirements = JSON.parse(JSON.stringify(saved.requirements));
      if (saved.copyDesign) state.copyDesign = JSON.parse(JSON.stringify(saved.copyDesign));
      if (saved.checklist) state.checklist = JSON.parse(JSON.stringify(saved.checklist));
      if (saved.evidenceLog) state.evidenceLog = JSON.parse(JSON.stringify(saved.evidenceLog));
      initState();
    }
  }

  function buildResults() {
    var applicableCount = 0; var implementedCount = 0;
    for (var i = 0; i < disclosureTypes.length; i++) {
      var req = state.requirements[disclosureTypes[i].id];
      if (req.applies === true) { applicableCount++; if (req.implemented === true) implementedCount++; }
    }
    return {
      completedDate: new Date().toISOString().split('T')[0],
      requirements: JSON.parse(JSON.stringify(state.requirements)),
      copyDesign: JSON.parse(JSON.stringify(state.copyDesign)),
      checklist: JSON.parse(JSON.stringify(state.checklist)),
      evidenceLog: JSON.parse(JSON.stringify(state.evidenceLog)),
      stats: { applicable: applicableCount, implemented: implementedCount, evidenceEntries: state.evidenceLog.length }
    };
  }

  function doSave() {
    config.interactiveToolResults = config.interactiveToolResults || {};
    config.interactiveToolResults.disclosureToolkit = buildResults();
    saveConfigToFile(config);
  }

  function doExport() {
    var r = buildResults(); var lines = [];
    lines.push('# User-Facing Disclosure Toolkit Report (Template 02)'); lines.push('');
    lines.push('**Date:** ' + r.completedDate);
    lines.push('**Applicable Law:** EU Art. 50; South Korea; China GenAI; Utah; California SB 942; Colorado; NYC LL 144; Illinois AIVIA');
    lines.push(''); lines.push('## 1. Disclosure Requirements Matrix'); lines.push('');
    lines.push('| Disclosure Type | Applies | Implemented | Jurisdictions |');
    lines.push('|----------------|---------|-------------|---------------|');
    for (var i = 0; i < disclosureTypes.length; i++) {
      var dt = disclosureTypes[i]; var req = r.requirements[dt.id] || {};
      var badgeTexts = [];
      for (var b = 0; b < dt.badges.length; b++) badgeTexts.push(dt.badges[b].text);
      var applies = req.applies === true ? 'Yes' : req.applies === false ? 'No' : 'N/A';
      var impl = req.implemented === true ? 'Yes' : req.implemented === false ? 'No' : 'N/A';
      lines.push('| ' + dt.label + ' | ' + applies + ' | ' + impl + ' | ' + badgeTexts.join(', ') + ' |');
    }
    lines.push(''); lines.push('## 2. Disclosure Copy Design'); lines.push('');
    for (var i = 0; i < disclosureTypes.length; i++) {
      var dt = disclosureTypes[i]; var req = r.requirements[dt.id] || {};
      if (req.applies !== true) continue;
      var cd = r.copyDesign[dt.id] || {};
      lines.push('### ' + dt.label);
      lines.push('- **Variation:** ' + (cd.variation || 'N/A'));
      lines.push('- **Copy text:** ' + (cd.copyText || 'N/A'));
      lines.push('- **Placement:** ' + (cd.placement || 'N/A'));
      lines.push('- **All languages:** ' + (cd.allLanguages === true ? 'Yes' : cd.allLanguages === false ? 'No' : 'N/A'));
      lines.push('');
    }
    lines.push('## 3. Implementation Checklist'); lines.push('');
    var phases = [
      { id: 'design', label: 'Design Phase', items: checklistPhases.design },
      { id: 'coding', label: 'Coding Phase', items: checklistPhases.coding },
      { id: 'testing', label: 'Testing Phase', items: checklistPhases.testing }
    ];
    for (var p = 0; p < phases.length; p++) {
      var phase = phases[p]; lines.push('### ' + phase.label);
      for (var j = 0; j < phase.items.length; j++) {
        var key = phase.id + '_' + j;
        var checked = r.checklist[phase.id] && r.checklist[phase.id][key];
        lines.push('- [' + (checked ? 'x' : ' ') + '] ' + phase.items[j]);
      }
      lines.push('');
    }
    lines.push('## 4. Evidence Log'); lines.push('');
    if (r.evidenceLog.length === 0) { lines.push('No evidence entries recorded.'); }
    else {
      lines.push('| # | Type | Location | Screenshot | Date | Verified By |');
      lines.push('|---|------|----------|------------|------|-------------|');
      for (var i = 0; i < r.evidenceLog.length; i++) {
        var e = r.evidenceLog[i]; var typeName = '';
        for (var d = 0; d < disclosureTypes.length; d++) { if (disclosureTypes[d].id === e.type) { typeName = disclosureTypes[d].label; break; } }
        lines.push('| ' + (i+1) + ' | ' + (typeName||e.type||'N/A') + ' | ' + (e.location||'N/A') + ' | ' + (e.screenshot||'N/A') + ' | ' + (e.dateVerified||'N/A') + ' | ' + (e.verifiedBy||'N/A') + ' |');
      }
    }
    lines.push(''); lines.push('## 5. Summary'); lines.push('');
    lines.push('- **Applicable disclosures:** ' + r.stats.applicable);
    lines.push('- **Implemented:** ' + r.stats.implemented + ' / ' + r.stats.applicable);
    lines.push('- **Evidence entries:** ' + r.stats.evidenceEntries);
    lines.push(''); lines.push('---');
    lines.push('*Generated by User-Facing Disclosure Toolkit. This is research, not legal advice.*');
    exportMarkdown('disclosure-toolkit-report.md', lines.join('\n'));
  }

  wizard.render();
})();
</script>
</body>
</html>
