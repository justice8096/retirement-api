name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Run shared tests
        run: npm run test:shared

      - name: Run API tests
        run: npm test

      - name: TypeScript type check
        run: npm run typecheck

      - name: Build
        run: npm run build

  sbom:
    # CycloneDX SBOM published as a CI artefact on every push.
    # LLM-Compliance roadmap Dimension 4 (Supply Chain) — path to SLSA L1.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate CycloneDX SBOM
        run: npm sbom --sbom-format cyclonedx --sbom-type application > sbom.json
      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-cyclonedx
          path: sbom.json
          retention-days: 90

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Use Node.js 22
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dependency vulnerability scan
        run: npm audit --audit-level=high

      - name: Check for hardcoded secrets
        run: |
          PATTERNS="sk_live_\|whsec_live_\|sk_test_[a-zA-Z0-9]\{20,\}\|AKIA[0-9A-Z]\{16\}\|-----BEGIN.*PRIVATE KEY-----"
          if grep -rn "$PATTERNS" \
            --include="*.js" --include="*.ts" --include="*.json" --include="*.env" \
            --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=dist \
            src/ shared/ prisma/ 2>/dev/null; then
            echo "::error::Potential secrets found in source code!"
            exit 1
          fi
          echo "No secrets detected."

      - name: Check for unsafe eval/exec patterns
        run: |
          if grep -rn "eval(\|new Function(\|child_process\|exec(\|execSync(" \
            --include="*.ts" --include="*.js" \
            --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=dist \
            src/ 2>/dev/null; then
            echo "::warning::Potential unsafe code execution patterns found - review manually"
          fi

      - name: OWASP dependency check
        run: |
          echo "=== OWASP Top 10 Checklist ==="
          echo "A01:2021 Broken Access Control - Clerk JWT + tier guards in middleware/auth.ts"
          echo "A02:2021 Cryptographic Failures - AES-256-GCM in middleware/encryption.ts"
          echo "A03:2021 Injection - Prisma parameterized queries + middleware/sanitize.ts"
          echo "A04:2021 Insecure Design - Rate limiting in middleware/rate-limit.ts"
          echo "A05:2021 Security Misconfiguration - Helmet headers + strict CORS"
          echo "A06:2021 Vulnerable Components - npm audit (see above)"
          echo "A07:2021 Auth Failures - Clerk handles auth, rate-limited login"
          echo "A08:2021 Data Integrity - Prisma migrations, typed schemas"
          echo "A09:2021 Logging Failures - Sentry + Fastify structured logging"
          echo "A10:2021 SSRF - No outbound requests from API except Clerk/Stripe SDKs"

  codeql-analysis:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@865f5f5c36632f18690a3d569fa0a764f2da0c3e # v3
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@865f5f5c36632f18690a3d569fa0a764f2da0c3e # v3

  docker-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: Dockerfile
        continue-on-error: true
