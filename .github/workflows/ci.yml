name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Run shared tests
        run: npm run test:shared

      - name: Run API tests
        run: npm test

      - name: TypeScript type check
        run: npm run typecheck

      - name: Build
        run: npm run build

  sbom:
    # CycloneDX SBOM published as a CI artefact on every push.
    # Part of the SLSA L1/L2 evidence chain.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate CycloneDX SBOM
        run: npm sbom --sbom-format cyclonedx --sbom-type application > sbom.json
      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-cyclonedx
          path: sbom.json
          retention-days: 90

  # SLSA L2 — build provenance attestation signed with Sigstore + OIDC.
  # Runs only on master-branch pushes (not PRs) because attestations need
  # id-token:write which is not granted to fork PRs. Produces a verifiable
  # claim linking the compiled TypeScript output to this exact source +
  # workflow run, queryable via `gh attestation verify dist/...`.
  provenance:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate --schema=prisma/schema.prisma
      - name: Compile TypeScript
        run: npx tsc
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/**/*.js

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Dependency vulnerability scan
        run: npm audit --audit-level=high

      - name: Check for hardcoded secrets
        run: |
          PATTERNS="sk_live_\|whsec_live_\|sk_test_[a-zA-Z0-9]\{20,\}\|AKIA[0-9A-Z]\{16\}\|-----BEGIN.*PRIVATE KEY-----"
          if grep -rn "$PATTERNS" \
            --include="*.js" --include="*.ts" --include="*.json" --include="*.env" \
            --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=dist \
            src/ shared/ prisma/ 2>/dev/null; then
            echo "::error::Potential secrets found in source code!"
            exit 1
          fi
          echo "No secrets detected."

      - name: Check for unsafe eval/exec patterns
        run: |
          if grep -rn "eval(\|new Function(\|child_process\|exec(\|execSync(" \
            --include="*.ts" --include="*.js" \
            --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=dist \
            src/ 2>/dev/null; then
            echo "::warning::Potential unsafe code execution patterns found - review manually"
          fi

      - name: OWASP dependency check
        run: |
          echo "=== OWASP Top 10 Checklist ==="
          echo "A01:2021 Broken Access Control - Clerk JWT + tier guards in middleware/auth.ts"
          echo "A02:2021 Cryptographic Failures - AES-256-GCM in middleware/encryption.ts"
          echo "A03:2021 Injection - Prisma parameterized queries + middleware/sanitize.ts"
          echo "A04:2021 Insecure Design - Rate limiting in middleware/rate-limit.ts"
          echo "A05:2021 Security Misconfiguration - Helmet headers + strict CORS"
          echo "A06:2021 Vulnerable Components - npm audit (see above)"
          echo "A07:2021 Auth Failures - Clerk handles auth, rate-limited login"
          echo "A08:2021 Data Integrity - Prisma migrations, typed schemas"
          echo "A09:2021 Logging Failures - Sentry + Fastify structured logging"
          echo "A10:2021 SSRF - No outbound requests from API except Clerk/Stripe SDKs"

  codeql-analysis:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2

  docker-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile
        continue-on-error: true
