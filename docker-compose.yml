version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-retirement_saas}
      POSTGRES_USER: ${POSTGRES_USER:-retirement}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-retirement} -d ${POSTGRES_DB:-retirement_saas}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '${API_PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-retirement}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-retirement_saas}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_BASIC: ${STRIPE_PRICE_BASIC:-}
      STRIPE_PRICE_PREMIUM: ${STRIPE_PRICE_PREMIUM:-}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY:?ENCRYPTION_MASTER_KEY is required}
      APP_URL: ${APP_URL:-http://localhost:8080}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Run migrations before API starts (one-shot)
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: npx prisma migrate deploy --schema=prisma/schema.prisma
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-retirement}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-retirement_saas}
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

volumes:
  pgdata:
