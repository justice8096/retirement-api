version: '3.8'

# Compose stack for the rogue homelab deploy.
# Expects the dashboard repo cloned as a sibling at `../retirement-dashboard-angular`
# (see Phase 3.2 of dashboard PR #76 / Dashboard-Infrastructure.md).

networks:
  internal:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    networks: [internal]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-retirement_saas}
      POSTGRES_USER: ${POSTGRES_USER:-retirement}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-retirement} -d ${POSTGRES_DB:-retirement_saas}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    networks: [internal]
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    networks: [internal]
    ports:
      - '${API_PORT:-3000}:3000'
    deploy:
      replicas: ${API_REPLICAS:-1}
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-retirement}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-retirement_saas}?connection_limit=50
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_BASIC: ${STRIPE_PRICE_BASIC:-}
      STRIPE_PRICE_PREMIUM: ${STRIPE_PRICE_PREMIUM:-}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY:?ENCRYPTION_MASTER_KEY is required}
      APP_URL: ${APP_URL:-http://localhost:8080}
      # CORS isn't actually exercised on the deploy path because nginx
      # proxies /api/* same-origin. Default kept for direct-to-api callers
      # (e.g. local Angular dev server) — bump to the deploy host via .env.
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Run migrations before API starts (one-shot)
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    networks: [internal]
    command: npx prisma migrate deploy --schema=prisma/schema.prisma
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-retirement}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-retirement_saas}
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  # Angular SPA + nginx reverse-proxy fronting the api.
  # Build context is a sibling clone — repo layout on the deploy host
  # must place retirement-api/ and retirement-dashboard-angular/ in the
  # same parent directory.
  dashboard:
    build:
      context: ../retirement-dashboard-angular
      dockerfile: Dockerfile
    networks: [internal]
    ports:
      - '${DASHBOARD_PORT:-8080}:8080'
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
    healthcheck:
      # 127.0.0.1, not localhost: nginx:alpine's /etc/hosts maps `localhost`
      # to ::1, but nginx listens on IPv4 only. Same fix as the api
      # Dockerfile HEALTHCHECK (PR fix/healthcheck-ipv4-loopback).
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:8080/healthz']
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
